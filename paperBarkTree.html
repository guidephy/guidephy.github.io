<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>白千層的守護任務</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 自定義動畫與樣式 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes bounceSubtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        @keyframes floatReward {
            0%, 100% { transform: translateY(0) rotate(-1deg); }
            50% { transform: translateY(-8px) rotate(1deg); }
        }
        @keyframes shimmer {
            0% { transform: translateX(-120%) skewX(-18deg); }
            100% { transform: translateX(220%) skewX(-18deg); }
        }
        @keyframes drawPath {
            to { stroke-dashoffset: 0; }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
        .is-soft-update .animate-fade-in {
            animation: none !important;
        }
        .animate-bounce-subtle {
            animation: bounceSubtle 2s infinite;
        }
        .animate-float-reward {
            animation: floatReward 3.2s ease-in-out infinite;
        }
        .coupon-shimmer::after {
            content: "";
            position: absolute;
            inset: -20%;
            width: 38%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.46), transparent);
            animation: shimmer 3.4s ease-in-out infinite;
        }
        .draw-path {
            stroke-dasharray: 340;
            stroke-dashoffset: 340;
            animation: drawPath 1.4s ease-out forwards;
        }
        .touch-action-manipulation {
            touch-action: manipulation;
        }
        /* 隱藏滾動條但保留功能 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        :root {
            color-scheme: light;
        }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(16, 185, 129, 0.14), transparent 34%),
                linear-gradient(180deg, #ecfdf5 0%, #f8fafc 28%, #f3f4f6 100%);
        }
        .app-shell {
            width: min(100%, 1100px);
            min-height: 100vh;
        }
        .content-width {
            width: min(100%, 960px);
            margin-inline: auto;
        }
        .story-frame {
            min-height: clamp(260px, 48vw, 560px);
        }
        .question-card {
            box-shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
        }
        @media (max-width: 640px) {
            .safe-vh {
                min-height: 100dvh;
            }
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans antialiased selection:bg-emerald-200">

    <div id="app" class="app-shell mx-auto safe-vh bg-white/90 shadow-xl shadow-emerald-950/10 relative flex flex-col backdrop-blur-sm lg:my-6 lg:rounded-[2rem] lg:border lg:border-white/70 lg:overflow-hidden">
        <!-- 內容將由 JavaScript 動態生成 -->
    </div>

                ],
                correctMatches: { bark: 'fire', root: 'wind', leaf: 'oil', flower: 'brush' },
                hint: "故事有提到：海綿般的樹皮是為了怕火燒，而種在觀音主要是為了「擋風」喔！",

            {
                id: 3,

                type: "multiselect",
                icon: Icons.BookOpen,
                storyImage: "https://lh7-rt.googleusercontent.com/docsz/AD_4nXfDknyM3O2DBhlKcH8FoqsHvqFCWSgaCNT-ov0PhbikRogvCwYEiPPb0HRRf4AlN2SgvAlCQ7PD72dCFvOOdN_mgGMdU-5Zf2s9j6eLZo3nHJkHmA_-GI98eqTBcZl9XzEJUG0xHZAJwBgOV1UDNRER?key=FHIAIJ-gaW42Wi8RxY0FKw",

                leftItems: [
                    { id: 'tw', text: "🇹🇼 台灣 (白千層林道)" },
                    { id: 'au', text: "🇦🇺 澳洲 (巨樹谷天空步道)" },
                    { id: 'sg', text: "🇸🇬 新加坡 (Eco-Link@BKE 生態橋)" },

                ],
                // 右側選項已打亂順序，避免直接水平對應

                options: [
                    { id: 'tree', text: "🌳 樹 (自然環境)" },
                    { id: 'human', text: "🧑 人 (你的參與)" },
                    { id: 'animal', text: "🐿️ 動物 (生態多樣)" },
                    { id: 'story', text: "📖 故事 (文化傳承)" }
                ],
                requiredCount: 3,
                hint: "其實每一個都很重要，請聽從你內心的聲音，選出你最有感覺的吧！",
                explanation: "" // 動態生成

        // --- 3. 狀態管理 (State) ---
        const state = {
            gameState: 'intro', // intro, playing, success
            currentLevel: 0,
            levelPhase: 'story', // story, quiz, feedback
            showHint: false,
            // 遊戲互動狀態
            selectedOption: null, // 單選
            multiSelections: [], // 多選
            matches: {}, // 配對 {leftId: rightId}
            selectedLeft: null, // 配對中選中的左邊
            sortOrder: [], // 排序
            dynamicFeedback: "" // 第五關回饋
        };

        // --- 4. 渲染邏輯 (Render Functions) ---
        const app = document.getElementById('app');
        let lastRenderViewKey = null;

        function render() {
            const viewKey = `${state.gameState}:${state.currentLevel}:${state.levelPhase}`;
            const shouldScrollTop = viewKey !== lastRenderViewKey;
            const previousScrollY = window.scrollY;
            app.classList.toggle('is-soft-update', !shouldScrollTop);
            app.innerHTML = ''; // 清空內容

            if (state.gameState === 'intro') {
                renderIntro();
            } else if (state.gameState === 'success') {
                renderSuccess();
            } else {
                renderLevel();
            }

            // 只有切換畫面或關卡時回到頂部，避免點選答案造成畫面跳動。
            if (shouldScrollTop) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                window.scrollTo(0, previousScrollY);
            }
            lastRenderViewKey = viewKey;
        }

        // 渲染：開場畫面
        function renderIntro() {
            const html = `
                <div class="flex-1 flex flex-col items-center justify-center px-4 py-8 sm:px-6 lg:px-10 text-center animate-fade-in bg-emerald-50/80 safe-vh">

                        <div class="bg-emerald-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 text-emerald-600">
                            ${Icons.Globe.replace('width="24"', 'width="48"').replace('height="24"', 'height="48"')}
                        </div>
                        <h1 class="text-3xl sm:text-4xl font-bold text-gray-800 mb-3">白千層的守護任務</h1>
                        <p class="text-emerald-700 font-medium mb-6 text-base sm:text-lg">觀音步道守護者捎來了一則訊息...</p>
                        
                        <div class="bg-gray-50 p-5 sm:p-6 rounded-2xl text-left text-gray-600 text-sm sm:text-base mb-8 leading-relaxed border border-gray-200 shadow-inner max-w-3xl mx-auto">
                            「親愛的小小探險家：<br><br>
                            觀音白千層步道正逐漸被人們遺忘...<br>
                            只有完成 <span class="font-bold text-emerald-600">5 道知識任務</span>，
                            才能重新啟動它的文化、生態與世界連線。<br><br>
                            每一關都有一個小故事，請仔細閱讀後再回答問題喔！<br><br>
                            你願意接受挑戰，成為守護員嗎？」
                        </div>

                        <button onclick="startGame()" class="w-full max-w-md mx-auto bg-emerald-600 active:bg-emerald-700 text-white font-bold py-4 px-6 rounded-xl shadow-lg transform transition active:scale-95 flex items-center justify-center gap-2 text-lg">
                            接受任務，出發！ <span class="w-6 h-6">${Icons.ArrowRight}</span>
                        </button>
                    </div>
                </div>
            `;
            app.innerHTML = html;
        }

        // 渲染：成功畫面
        function renderSuccess() {
             const html = `
                <div class="flex-1 flex flex-col items-center justify-center px-4 py-8 sm:px-6 lg:px-10 text-center animate-fade-in bg-gradient-to-b from-emerald-100 to-white safe-vh">
                    <div class="content-width bg-white p-6 sm:p-8 lg:p-10 rounded-[2rem] shadow-2xl w-full border-4 border-yellow-400 relative overflow-hidden question-card">
                        <div class="absolute top-0 right-0 p-2 opacity-10 text-yellow-500 scale-150 transform translate-x-4 -translate-y-4">
                            ${Icons.Award.replace('width="24"', 'width="120"').replace('height="24"', 'height="120"')}
                        </div>
                    
                        <div class="bg-yellow-100 w-24 h-24 rounded-full flex items-center justify-center mx-auto mb-6 animate-bounce text-yellow-600">
                             ${Icons.Award.replace('width="24"', 'width="48"').replace('height="24"', 'height="48"')}

        // --- 子渲染函數：題型 ---

        function renderTypeQuiz(data) {
            return `
                <div class="space-y-3">
                    ${data.options.map(opt => `
                        <button onclick="selectOption('${opt.id}')" 
                            class="w-full text-left p-4 rounded-xl border-2 transition-colors ${state.selectedOption === opt.id ? 'border-emerald-500 bg-emerald-50 text-emerald-700 font-bold ring-2 ring-emerald-200' : 'border-gray-100 bg-white text-gray-600'}">
                            ${opt.text}
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function renderTypeMatching(data) {
            return `
                <div class="space-y-4">
                    <div class="rounded-2xl border border-emerald-100 bg-emerald-50/70 p-3 sm:p-4">
                        <div class="flex flex-wrap items-center gap-2 text-xs sm:text-sm font-bold text-emerald-800">
                            <span class="rounded-full bg-white px-3 py-1 border border-emerald-200">1. 先點左邊題目</span>
                            <span class="rounded-full bg-white px-3 py-1 border border-emerald-200">2. 再點右邊答案</span>
                            <span class="rounded-full bg-white px-3 py-1 border border-emerald-200">3. 配對錯了可重點左邊取消</span>
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-3 sm:gap-4 items-start">
                    <div class="flex flex-col gap-3 min-w-0 rounded-2xl bg-emerald-50/80 p-2 sm:p-3 border border-emerald-100">
                        <div class="text-center text-xs sm:text-sm font-bold text-emerald-700 tracking-wide">左邊：題目</div>
                        ${data.leftItems.map(item => `
                            <button onclick="clickLeft('${item.id}')" 
                                class="w-full p-3 sm:p-4 text-xs sm:text-sm lg:text-base rounded-xl border-2 text-left transition-all min-h-[96px] sm:min-h-[104px] flex items-center justify-start leading-snug
                                ${state.matches[item.id] ? 'bg-emerald-100 border-emerald-500 opacity-70' : 
                                  state.selectedLeft === item.id ? 'bg-white border-emerald-500 ring-2 ring-emerald-200 font-bold' : 'border-emerald-200 bg-white/90'}">
                                ${item.text}
                            </button>
                        `).join('')}
                    </div>
                    <div class="flex flex-col gap-3 min-w-0 rounded-2xl bg-sky-50/90 p-2 sm:p-3 border border-sky-100">
                        <div class="text-center text-xs sm:text-sm font-bold text-sky-700 tracking-wide">右邊：答案</div>
                        ${data.rightItems.map(item => {
                            const isMatched = Object.values(state.matches).includes(item.id);
                            return `
                                <button onclick="clickRight('${item.id}')"
                                    class="w-full p-3 sm:p-4 text-xs sm:text-sm lg:text-base rounded-xl border-2 text-left min-h-[96px] sm:min-h-[104px] flex items-center justify-start transition-all leading-snug
                                    ${isMatched ? 'bg-sky-100 border-sky-500 text-sky-900 opacity-80 font-bold' : 'border-sky-200 border-dashed bg-white/90'}">
                                    ${isMatched ? "✅ " + item.text : item.text}
                                </button>
                            `;
                        }).join('')}
                    </div>
                    </div>
                </div>
            `;
        }

        function renderTypeMultiSelect(data) {
            return `
                <div class="grid grid-cols-2 gap-3 sm:gap-4">
                    ${data.options.map(opt => `
                        <button onclick="toggleMulti('${opt.id}')"
                            class="p-4 sm:p-5 rounded-xl border-2 flex flex-col items-center justify-center gap-2 transition-colors min-h-[132px]
                            ${state.multiSelections.includes(opt.id) ? 'border-emerald-500 bg-emerald-50 text-emerald-700 ring-2 ring-emerald-200' : 'border-gray-100 bg-white text-gray-600'}">
                            <span class="text-3xl sm:text-4xl block mb-1">${opt.text.split(' ')[0]}</span>
                            <span class="font-bold text-sm sm:text-base text-center">${opt.text.split(' ')[1]}</span>
                        </button>
                    `).join('')}
                </div>
            `;
        }

        function renderTypeSorting(data) {
            return `
                <div class="space-y-4">
                    <div class="flex flex-wrap gap-2 justify-center mb-4 min-h-[72px] p-3 sm:p-4 bg-gray-50 rounded-xl border border-gray-200 border-dashed items-center">
                        ${state.sortOrder.length === 0 ? '<span class="text-gray-400 text-sm">請依序點擊下方選項...</span>' : ''}
                        ${state.sortOrder.map((id, index) => {
                            const item = data.options.find(o => o.id === id);
                            return `
                                <span class="bg-emerald-600 text-white px-3 py-1.5 rounded-full text-sm font-bold flex items-center shadow-sm animate-fade-in">
                                    <span class="mr-2 bg-white text-emerald-600 rounded-full w-5 h-5 flex items-center justify-center text-xs font-extrabold">${index + 1}</span>
                                    ${item.text}
                                </span>
                            `;
                        }).join('')}
                    </div>
                    <div class="grid grid-cols-2 gap-3 sm:gap-4">
                        ${data.options.map(opt => `
                            <button onclick="toggleSort('${opt.id}')"
                                class="p-3 sm:p-4 rounded-xl border-2 text-sm sm:text-base font-bold transition-all min-h-[72px]
                                ${state.sortOrder.includes(opt.id) ? 'opacity-40 cursor-not-allowed border-gray-200 bg-gray-100' : 'border-gray-200 bg-white text-gray-700 active:border-emerald-400 active:bg-emerald-50'}">
                                ${opt.text}
                            </button>
                        `).join('')}
                    </div>
                    ${state.sortOrder.length > 0 ? `
                        <button onclick="resetSort()" class="w-full text-center text-gray-400 text-xs underline py-2">重置選擇</button>
                    ` : ''}
                </div>
            `;
        }

        // --- 5. 邏輯處理 (Logic Handlers) ---

        window.startGame = () => {
            state.gameState = 'playing';
            state.currentLevel = 0;
            state.levelPhase = 'story';
            render();
        };

        window.goToQuiz = () => {
            state.levelPhase = 'quiz';
            state.showHint = false;
            // Reset interaction states
            state.selectedOption = null;
            state.multiSelections = [];
            state.matches = {};
            state.selectedLeft = null;
            state.sortOrder = [];
            render();
        };
        
        window.goToStory = () => {
            state.levelPhase = 'story';
            render();
        };

        window.toggleHint = () => {
            state.showHint = !state.showHint;
            render();
        };

        window.nextLevel = () => {
            if (state.currentLevel < levels.length - 1) {
                state.currentLevel++;
                state.levelPhase = 'story';
                render();
            } else {
                state.gameState = 'success';
                render();
            }
        };

        // --- 互動邏輯 ---

        // 單選
        window.selectOption = (id) => {
            state.selectedOption = id;
            render();
        };

        // 配對
        window.clickLeft = (id) => {
            // 如果已經配對，點擊則取消配對
            if (state.matches[id]) {
                delete state.matches[id];
            }
            state.selectedLeft = id;
            render();
        };

        window.clickRight = (id) => {
            if (!state.selectedLeft) return;
            state.matches[state.selectedLeft] = id;
            state.selectedLeft = null;
            render();
        };

        // 多選
        window.toggleMulti = (id) => {
            if (state.multiSelections.includes(id)) {
                state.multiSelections = state.multiSelections.filter(item => item !== id);
            } else {
                if (state.multiSelections.length < 2) {
                    state.multiSelections.push(id);
                }
            }
            render();
        };

        // 排序
        window.toggleSort = (id) => {
            if (state.sortOrder.includes(id)) {
                state.sortOrder = state.sortOrder.filter(item => item !== id);
            } else {
                if (state.sortOrder.length < 3) {
                    state.sortOrder.push(id);
                }
            }
            render();
        };

        window.resetSort = () => {
            state.sortOrder = [];
            render();
        };


        // --- 答案檢查 ---

        window.checkAnswer = () => {
            const currentData = levels[state.currentLevel];

            // 1. 單選題
            if (currentData.type === 'quiz') {
                if (state.selectedOption === currentData.correctAnswer) {
                    state.levelPhase = 'feedback';
                    render();
                } else {
                    alert("答案不對喔，回去看看故事怎麼說的！");
                }
            }

            // 2. 配對題
            else if (currentData.type === 'matching') {
                const correctConfig = currentData.correctMatches;
                const currentKeys = Object.keys(state.matches);

                if (currentKeys.length !== currentData.leftItems.length) {
                    alert("還有選項還沒連線喔！");
                    return;
                }

                let allCorrect = true;
                currentKeys.forEach(leftKey => {
                    if (state.matches[leftKey] !== correctConfig[leftKey]) {
                        allCorrect = false;
                    }
                });

                if (allCorrect) {
                    state.levelPhase = 'feedback';
                    render();
                } else {
                    alert("有連線錯誤喔！\n\n不用全部重來，請點擊「錯誤的左邊選項」取消連線，然後再選一次正確的答案！");
                }
            }

            // 3. 多選題
            else if (currentData.type === 'multiselect') {
                const correct = currentData.correctAnswers;
                if (state.multiSelections.length !== 2) {
                    alert("請選擇 2 個答案！");
                    return;
                }
                const isCorrect = state.multiSelections.every(val => correct.includes(val));
                if (isCorrect) {
                    state.levelPhase = 'feedback';
                    render();
                } else {
                    alert("好像有選到不適合這裡的動物喔？");
                }
            }

            // 4. 排序題 (Level 5)
            else if (currentData.type === 'sorting') {
                if (state.sortOrder.length !== 3) {
                    alert("請選出 3 個最重要的元素！");
                    return;
                }

                const feedbackMap = {
                    tree: {
                        label: "樹與自然環境",
                        focus: "你最重視「樹與自然環境」。這代表你看見了環境守護的根本：健康的樹木、防風林與綠地，是生態和人類生活能穩定延續的基礎。",
                        support: "你也把「樹與自然環境」納入考量，表示你知道所有步道守護都需要從照顧棲地與植物開始。"
                    },
                    human: {
                        label: "人的參與",
                        focus: "你最重視「人的參與」。這代表你相信環境不會自己被記得，必須有人願意走進步道、理解它、照顧它，守護行動才會真的發生。",
                        support: "你也重視「人的參與」，表示你知道環境教育、日常行動與社群支持，會讓守護變得長久。"
                    },
                    animal: {
                        label: "動物與生態多樣性",
                        focus: "你最重視「動物與生態多樣性」。這代表你很在意步道是否能成為生命的家，讓鳥類、青蛙和其他生物都能在這裡安全生活。",
                        support: "你也選擇了「動物與生態多樣性」，表示你會從生命共存的角度思考步道價值。"
                    },
                    story: {
                        label: "故事與文化傳承",
                        focus: "你最重視「故事與文化傳承」。這代表你看見了步道不只是路，也承載地方記憶、地名由來與人和土地之間的情感。",
                        support: "你也放入「故事與文化傳承」，表示你知道環境守護不只保護自然，也要把地方故事繼續傳下去。"
                    }
                };
                const selectedLabels = state.sortOrder.map(id => feedbackMap[id].label).join("、");
                const focusText = feedbackMap[state.sortOrder[0]].focus;
                const supportText = state.sortOrder.slice(1).map((id, index) => {
                    return `第 ${index + 2} 順位：${feedbackMap[id].support}`;
                }).join("\n");
                const feedback = `你的環境守護排序是：${selectedLabels}。\n\n${focusText}\n\n${supportText}\n\n這三個選擇合在一起，形成了你的環境守護觀：先抓住最重要的核心，再用其他元素補足步道的自然、生態、文化與行動力量。`;
                state.dynamicFeedback = feedback;
                state.levelPhase = 'feedback';
                render();
            }
        };

        // 初始化
        render();

    </script>
</body>
</html>
