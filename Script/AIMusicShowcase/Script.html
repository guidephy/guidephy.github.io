<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 音樂創作成果發表會 — 雙語教學逐字稿練習</title>
<style>
/* ─────────────────────────────────────────────────
   RESET & BASE
───────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #f4f0ea;
  --bg2:         #ede8e0;
  --surface:     #faf8f5;
  --surface2:    #f0ece5;
  --border:      #dbd4ca;
  --text-dark:   #3c3530;
  --text-mid:    #6e6560;
  --text-light:  #9e9890;
  --sage:        #8ea09a;
  --sage-light:  #e8f0ee;
  --sage-mid:    #b8ccc8;
  --green:       #97ab8f;
  --green-light: #eaf0e6;
  --green-mid:   #bfd0ba;
  --rose:        #c0968e;
  --rose-light:  #f5ebe8;
  --rose-mid:    #dab8b3;
  --sand:        #c8b49a;
  --sand-light:  #f5ede3;
  --radius-sm:   8px;
  --radius-md:   12px;
  --radius-lg:   16px;
  --shadow-sm:   0 1px 4px rgba(60,53,48,.08);
  --shadow-md:   0 4px 16px rgba(60,53,48,.12);
  --shadow-lg:   0 8px 32px rgba(60,53,48,.16);
  --transition:  0.22s ease;
}

html { scroll-behavior: smooth; }

body {
  font-family: 'Segoe UI', 'Noto Sans TC', 'PingFang TC', sans-serif;
  background: var(--bg);
  color: var(--text-dark);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}

/* ─────────────────────────────────────────────────
   HEADER
───────────────────────────────────────────────── */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 20px 24px 16px;
  text-align: center;
}
header h1 {
  font-size: clamp(1.1rem, 2.5vw, 1.5rem);
  color: var(--text-dark);
  font-weight: 700;
  letter-spacing: 0.5px;
}
header p {
  font-size: 0.82rem;
  color: var(--text-light);
  margin-top: 5px;
}
.header-controls {
  margin-top: 15px;
}
.btn-play-all {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--sage);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 10px 24px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 4px 12px rgba(142,160,154,.3);
}
.btn-play-all:hover {
  background: #7a9088;
  transform: translateY(-2px);
  box-shadow: 0 6px 16px rgba(142,160,154,.4);
}
.btn-play-all.playing {
  background: var(--rose);
  box-shadow: 0 4px 12px rgba(192,150,142,.3);
}
.btn-play-all.playing:hover {
  background: #a87e77;
}
.header-badge {
  display: inline-block;
  background: var(--sand-light);
  color: var(--sand);
  border: 1px solid var(--sand);
  border-radius: 20px;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 2px 10px;
  margin-top: 8px;
  letter-spacing: 0.5px;
}

/* ─────────────────────────────────────────────────
   NAVIGATION BAR
───────────────────────────────────────────────── */
.nav-wrap {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 200;
  box-shadow: var(--shadow-sm);
}
.nav-bar {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  justify-content: center;
  padding: 10px 16px;
  max-width: 1300px;
  margin: 0 auto;
}
.nav-btn {
  background: var(--bg2);
  color: var(--text-mid);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 13px;
  font-size: 0.76rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}
.nav-btn:hover {
  background: var(--sage-light);
  color: var(--sage);
  border-color: var(--sage-mid);
}
.nav-btn.active {
  background: var(--sage);
  color: #fff;
  border-color: var(--sage);
  box-shadow: 0 2px 8px rgba(142,160,154,.35);
}

/* ─────────────────────────────────────────────────
   PROGRESS BAR
───────────────────────────────────────────────── */
.progress-bar-wrap { height: 3px; background: var(--border); }
.progress-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--sage), var(--green));
  transition: width var(--transition);
}

/* ─────────────────────────────────────────────────
   MAIN LAYOUT
───────────────────────────────────────────────── */
.slide-section {
  display: none;
  max-width: 1280px;
  margin: 0 auto;
  padding: 28px 20px 56px;
}
.slide-section.active { display: block; }

.slide-label {
  font-size: 0.75rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--text-light);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.slide-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

.slide-layout {
  display: grid;
  grid-template-columns: 42% 1fr;
  gap: 28px;
  align-items: start;
}

/* ─────────────────────────────────────────────────
   LEFT COLUMN: IMAGE + NAV BUTTONS
───────────────────────────────────────────────── */
.slide-left {
  position: sticky;
  top: 72px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.slide-img-wrap {
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: var(--shadow-lg);
  border: 1px solid var(--border);
  background: #fff;
}
.slide-img-wrap img {
  width: 100%;
  display: block;
}
.slide-counter-badge {
  text-align: center;
  font-size: 0.75rem;
  color: var(--text-light);
  padding: 8px;
  background: var(--surface2);
  border-top: 1px solid var(--border);
  letter-spacing: 0.5px;
}

/* Prev / Next under the image */
.slide-nav-under {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.btn-nav {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface);
  color: var(--text-mid);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 18px;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: var(--shadow-sm);
  flex: 1;
  justify-content: center;
}
.btn-nav:hover {
  background: var(--sage-light);
  color: var(--sage);
  border-color: var(--sage-mid);
  transform: translateY(-1px);
  box-shadow: var(--shadow-md);
}
.btn-nav:disabled { opacity: 0.3; pointer-events: none; }
.btn-nav.btn-next {
  background: var(--sage);
  color: #fff;
  border-color: var(--sage);
  box-shadow: 0 2px 10px rgba(142,160,154,.3);
}
.btn-nav.btn-next:hover { background: #7a9088; }

.nav-dots {
  display: flex;
  gap: 5px;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.nav-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--border);
  cursor: pointer;
  transition: all var(--transition);
}
.nav-dot.active { background: var(--sage); transform: scale(1.3); }

/* ─────────────────────────────────────────────────
   RIGHT COLUMN: CONTENT PANELS
───────────────────────────────────────────────── */
.slide-content { display: flex; flex-direction: column; gap: 14px; }

.panel {
  background: var(--surface);
  border-radius: var(--radius-md);
  border: 1px solid var(--border);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  transition: box-shadow var(--transition);
}
.panel:hover { box-shadow: var(--shadow-md); }

.panel-header {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 16px;
  font-size: 0.73rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  transition: background var(--transition);
}
.panel-header:hover { background: var(--bg2); }
.panel-header .icon { font-size: 1rem; }
.panel-header .chevron {
  margin-left: auto;
  font-size: 0.7rem;
  transition: transform var(--transition);
  color: var(--text-light);
}
.panel.collapsed .panel-header .chevron { transform: rotate(-90deg); }
.panel.collapsed .panel-body { display: none; }

.panel-body { padding: 16px; }

/* Script panel */
.panel-script .panel-header { background: var(--sage-light); color: var(--sage); border-bottom-color: var(--sage-mid); }
.script-text { font-size: 1.02rem; line-height: 1.95; color: var(--text-dark); }

/* TTS controls */
.tts-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid var(--border);
}
.btn-play-main {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  background: var(--sage);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 9px 20px;
  font-size: 0.88rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  box-shadow: 0 2px 10px rgba(142,160,154,.3);
}
.btn-play-main:hover { background: #7a9088; transform: translateY(-1px); }
.btn-play-main:active { transform: translateY(0); }
.btn-play-main.playing { background: var(--rose); }

.btn-stop {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--bg2);
  color: var(--text-mid);
  border: 1px solid var(--border);
  border-radius: 50px;
  padding: 9px 16px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-stop:hover { background: var(--border); }

.speed-wrap {
  display: flex;
  align-items: center;
  gap: 7px;
  font-size: 0.78rem;
  color: var(--text-light);
}
.speed-wrap input[type=range] { width: 80px; accent-color: var(--sage); cursor: pointer; }
.speed-val { min-width: 34px; font-size: 0.78rem; color: var(--text-mid); font-weight: 600; }

/* 音頻視覺化動畫 (Audio Visualizer) */
.audio-visualizer {
  display: none;
  align-items: center;
  gap: 2.5px;
  height: 12px;
  margin-left: 4px;
}
.audio-visualizer span {
  display: inline-block;
  width: 3px;
  height: 100%;
  background-color: currentColor; /* 自動繼承文字顏色 */
  border-radius: 1px;
  animation: sound-wave 0.8s infinite ease-in-out;
}
.audio-visualizer span:nth-child(1) { animation-delay: -0.2s; }
.audio-visualizer span:nth-child(2) { animation-delay: -0.4s; }
.audio-visualizer span:nth-child(3) { animation-delay: -0.6s; }

@keyframes sound-wave {
  0%, 100% { transform: scaleY(0.4); }
  50% { transform: scaleY(1); }
}

.playing .audio-visualizer {
  display: flex;
}

/* Translation panel */
.panel-zh .panel-header { background: var(--green-light); color: var(--green); border-bottom-color: var(--green-mid); }
.zh-text { font-size: 0.97rem; line-height: 1.95; color: var(--text-mid); }

/* Classroom panel */
.panel-classroom .panel-header { background: var(--rose-light); color: var(--rose); border-bottom-color: var(--rose-mid); }

.classroom-item {
  background: var(--bg);
  border: 1px solid var(--border);
  border-left: 3px solid var(--rose-mid);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
  padding: 11px 14px;
  margin-bottom: 10px;
  transition: border-left-color var(--transition);
}
.classroom-item:last-child { margin-bottom: 0; }
.classroom-item:hover { border-left-color: var(--rose); background: var(--rose-light); }
.classroom-en { font-size: 0.97rem; color: var(--text-dark); font-weight: 600; margin-bottom: 4px; line-height: 1.5; }
.classroom-zh { font-size: 0.84rem; color: var(--text-mid); margin-bottom: 4px; }
.classroom-context { font-size: 0.75rem; color: var(--text-light); font-style: italic; }
.classroom-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 7px; }
.btn-play-cls {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--rose-light);
  color: var(--rose);
  border: 1px solid var(--rose-mid);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 0.76rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
}
.btn-play-cls:hover { background: var(--rose); color: #fff; border-color: var(--rose); }
.btn-play-cls.playing { background: var(--rose); color: #fff; }

/* ─────────────────────────────────────────────────
   RESPONSIVE
───────────────────────────────────────────────── */
@media (max-width: 900px) {
  .slide-layout { grid-template-columns: 1fr; }
  .slide-left { position: static; max-width: 560px; margin: 0 auto; width: 100%; }
}
@media (max-width: 600px) {
  header { padding: 14px 16px 12px; }
  .slide-section { padding: 16px 12px 48px; }
  .btn-play-main, .btn-stop { padding: 8px 14px; font-size: 0.82rem; }
  .nav-btn { padding: 4px 10px; font-size: 0.7rem; }
  .speed-wrap input[type=range] { width: 60px; }
  .nav-dots { display: none; }
}

/* Animation */
.slide-section.active { animation: fadeInUp 0.3s ease; }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
</style>
</head>
<body>

<header>
  <h1>🎵 AI 音樂創作成果發表會</h1>
  <p>雙語教學逐字稿練習</p>
  <div class="header-controls">
    <button id="btnPlayAll" class="btn-play-all" onclick="togglePlayAll()">
      ▶ 連續播放 (從本頁開始)
    </button>
  </div>
  <span class="header-badge">18 張投影片</span>
</header>

<div class="nav-wrap">
  <div class="nav-bar" id="navBar"></div>
  <div class="progress-bar-wrap">
    <div class="progress-bar" id="progressBar" style="width:5.56%"></div>
  </div>
</div>

<div id="slideContainer"></div>

<script>
// ============================================================
//  SLIDE DATA
// ============================================================
const slides = [

{
  img: "img/1.png",
  label: "Slide 1 — Title Slide",
  script: `Hello, everyone! Welcome to Guanyin High School. I’m Purple, and this is my partner teacher, Ben. We are so glad to have you in our AI Application class! My English is not perfect, but for our friends from Wayland High School, I will try my best to teach the whole class in English today! We’re very excited to share our AI Music Video Showcase with you. Thank you for joining us, and we hope you enjoy the class!`,
  zh: `大家好！歡迎來到觀音高中。我是 Purple，這位是我的搭檔老師 Ben。很高興能在 AI 應用課程中見到你們！我的英文不是很完美，但為了我們來自 Wayland 高中的朋友們，我今天會盡全力用全英文來上這堂課！我們非常興奮能與你們分享我們的 AI 音樂影片成果發表會。感謝你們的參與，希望你們喜歡這堂課！`,
  classroom: [
    { en: "Is everyone here? Please sit with your groups.", zh: "大家都到了嗎？請按小組坐好。", ctx: "開場點名，確認學生就位" },
    { en: "Wayland friends, please join our students. Let's sit together!", zh: "Wayland 的朋友們，請加入我們的學生，大家坐在一起吧！", ctx: "歡迎交流生，請大家混坐" },
    { en: "Can everyone hear me? Is the volume okay?", zh: "大家聽得到我說話嗎？音量還可以嗎？", ctx: "確認音響與距離沒問題" },
    { en: "Let's give a warm welcome to our guests from Wayland!", zh: "讓我們熱烈歡迎來自 Wayland 的貴賓！", ctx: "帶動全場氣氛，帶頭鼓掌" },
    { en: "Don't be shy — feel free to ask questions anytime!", zh: "不用害羞，隨時都可以提問！", ctx: "鼓勵交流生勇敢開口" },
  ]
},

{
  img: "img/2.png",
  label: "Slide 2 — Today's Journey",
  script: `Today is going to be a journey! First, we have a welcome performance. Second, I will briefly introduce what we do with our students in this AI class. Third, we will showcase our students' works. After that, it's time for our Music Jam! And finally, we will have a reflection together. It will be a busy and happy morning!`,
  zh: `今天將是一趟旅程！首先，我們有一個歡迎表演。第二，我會簡單介紹這門 AI 課我們帶學生做什麼。第三，我們將展示學生們的作品。在那之後，就是我們的音樂即興創作時間！最後，我們將一起進行反思。這將是一個忙碌而快樂的早上！`,
  classroom: [
    { en: "Can everyone see the screen clearly?", zh: "大家都看得清楚螢幕嗎？", ctx: "確認視線沒有遮擋" },
    { en: "Let me walk you through today's agenda.", zh: "讓我帶大家看一下今天的議程。", ctx: "介紹行程時的開場白" },
    { en: "Any questions about today's schedule before we start?", zh: "在我們開始之前，對今天的行程有任何問題嗎？", ctx: "給學生問問題的機會" },
    { en: "This morning will be full of surprises — are you ready?", zh: "今天早上將充滿驚喜——你們準備好了嗎？", ctx: "炒熱氣氛的問句" },
  ]
},

{
  img: "img/3.png",
  label: "Slide 3 — Welcome Performance",
  script: `As a warm welcome, our Grade 11 and 12 students have prepared a special music performance. They are so excited to play for you. Please give them a big hand! ... Wow! That was amazing! Let's give our performers a big hand again! Thank you, seniors! Now, let's dive into our AI class.`,
  zh: `為了表達熱烈的歡迎，我們的高二和高三學生準備了特別的音樂表演。他們非常興奮能為你們演出。請給他們熱烈的掌聲！……哇！太精彩了！讓我們再次給表演者熱烈的掌聲！謝謝學長姐！現在，讓我們正式進入 AI 課程。`,
  classroom: [
    { en: "Please give them a big hand!", zh: "請給他們熱烈的掌聲！", ctx: "帶動觀眾鼓掌" },
    { en: "That was absolutely wonderful, wasn't it?", zh: "那真是太精彩了，不是嗎？", ctx: "演出後詢問感想" },
    { en: "Did you enjoy the performance? Give me a thumbs up!", zh: "你們喜歡這個表演嗎？給我一個讚！", ctx: "互動式問法" },
    { en: "Thank you so much for performing. You were fantastic!", zh: "非常感謝你們的演出，你們太棒了！", ctx: "對表演者道謝" },
    { en: "Alright, let's move on to the next part of our program.", zh: "好的，讓我們繼續進行活動的下一個部分。", ctx: "轉換活動的過渡語" },
  ]
},

{
  img: "img/4.png",
  label: "Slide 4 — Our First AI Project",
  script: `How do we use AI responsibly?`,
  zh: `我們如何負責任地使用 AI？`,
  classroom: [
    { en: "Has anyone used AI before? Raise your hand!", zh: "有人之前用過 AI 嗎？舉手！", ctx: "了解學生的先備經驗" },
    { en: "What do you think AI can do? Any ideas?", zh: "你們覺得 AI 能做什麼？有什麼想法嗎？", ctx: "暖身討論，開放式提問" },
    { en: "This is our very first AI project. Exciting, right?", zh: "這是我們的第一個 AI 專題，很令人興奮吧？", ctx: "建立期待感" },
    { en: "Don't worry if you've never tried AI — we'll learn together!", zh: "如果你從來沒用過 AI，不用擔心——我們一起學！", ctx: "安撫對 AI 感到陌生的學生" },
  ]
},

{
  img: "img/5.png",
  label: "Slide 5 — H-AI-H Model (Intro)",
  script: `To use AI correctly, we follow the H-AI-H model. H-AI-H stands for Human Inquiry, AI Production, and Human Reflection. This model helps us stay in charge while working with AI.`,
  zh: `為了正確使用 AI，我們遵循 H-AI-H 模型。H-AI-H 代表人類探究、AI 生成，以及人類反思。這個模型幫助我們在與 AI 合作時保持主導地位。`,
  classroom: [
    { en: "Have you ever heard of the H-AI-H model? It's our special approach.", zh: "你們有聽說過 H-AI-H 模型嗎？這是我們的特殊方法。", ctx: "介紹核心概念" },
    { en: "Who do you think should be in charge — humans or AI?", zh: "你們覺得應該由誰主導——人類還是 AI？", ctx: "引發思考與討論" },
    { en: "Let's say it together: Human — AI — Human!", zh: "我們一起說：人類——AI——人類！", ctx: "帶領學生一起複誦" },
    { en: "AI is a tool, not a decision-maker. Do you agree?", zh: "AI 是工具，不是決策者。你們同意嗎？", ctx: "針對 AI 角色的觀念討論" },
  ]
},

{

// ============================================================
//  TTS ENGINE & LOGIC
// ============================================================
let activeBtnRef = null;
let isPlayingAll = false;
let globalPlayAllTimer = null;

function getVoice() {
  const voices = window.speechSynthesis.getVoices();
  return voices.find(v => v.lang === 'en-US' && /samantha|zira|susan|karen|moira/i.test(v.name))
      || voices.find(v => v.lang === 'en-US')
      || voices.find(v => /^en/i.test(v.lang))
      || null;
}

function getRate(slideIdx) {
  const el = document.getElementById('speed-' + slideIdx);
  return el ? parseFloat(el.value) : 1.0;
}

// 更新按鈕狀態與視覺效果
function updateBtnState(btn, isPlaying) {
  if (!btn) return;
  const textSpan = btn.querySelector('.play-text');
  
  if (isPlaying) {
    btn.classList.add('playing');
    if (textSpan) {
      // 記錄原來的文字（可能是「播放全部」或「播放選取段落」）
      textSpan.dataset.originalText = textSpan.textContent; 
      textSpan.textContent = '⏹ 停止';
    }
  } else {
    btn.classList.remove('playing');
    if (textSpan) {
      // 若是主按鈕，停止時依據當下是否有反白文字來還原顯示文字
      if (btn.classList.contains('btn-play-main')) {
        const selection = window.getSelection().toString().trim();
        textSpan.textContent = selection ? '▶ 播放選取段落' : '▶ 播放全部';
      } else {
        // 課室補充按鈕直接還原
        textSpan.textContent = textSpan.dataset.originalText || '▶ 播放';
      }
    }
  }
}

function forceStop() {
  isPlayingAll = false;
  clearTimeout(globalPlayAllTimer);
  const btnAll = document.getElementById('btnPlayAll');
  if (btnAll) {
    btnAll.classList.remove('playing');
    btnAll.innerHTML = '▶ 連續播放 (從本頁開始)';
  }
  
  window.speechSynthesis.cancel();
  if (activeBtnRef) {
    updateBtnState(activeBtnRef, false);
    activeBtnRef = null;
  }
}

function speakText(text, btn, slideIdx, onEndCallback) {
  // 如果點擊的是正在播放的按鈕，就切換停止 (非連播模式下)
  if (activeBtnRef === btn && !isPlayingAll) { 
    forceStop(); 
    return; 
  }
  
  // 取消目前正在播放的語音 (保留 isPlayingAll 狀態以接續下一句)
  window.speechSynthesis.cancel();
  if (activeBtnRef) {
    updateBtnState(activeBtnRef, false);
    activeBtnRef = null;
  }
  
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = slideIdx !== undefined ? getRate(slideIdx) : 1.0;
  u.pitch = 1.0;
  const v = getVoice();
  if (v) u.voice = v;
  
  u.onend = u.onerror = () => {
    if (activeBtnRef === btn) {
      updateBtnState(btn, false);
      activeBtnRef = null;
    }
    if (onEndCallback) onEndCallback();
  };
  
  if (btn) {
    updateBtnState(btn, true);
    activeBtnRef = btn;
  }
  window.speechSynthesis.speak(u);
}

// 播放段落邏輯：有選取文字聽選取，沒選取聽全部
function playScript(btn, idx) {
  const selectedText = window.getSelection().toString().trim();
  if (selectedText) {
    speakText(selectedText, btn, idx);
  } else {
    const fullText = document.getElementById('script-' + idx).textContent;
    speakText(fullText, btn, idx);
  }
}

// 連續播放功能
function togglePlayAll() {
  const btn = document.getElementById('btnPlayAll');
  if (isPlayingAll) {
    forceStop();
  } else {
    isPlayingAll = true;
    btn.classList.add('playing');
    btn.innerHTML = '⏹ 停止連續播放';
    // 如果已經在最後一頁，自動從頭開始
    const startIdx = (currentSlide === slides.length - 1) ? 0 : currentSlide;
    playSlideSequence(startIdx);
  }
}

function playSlideSequence(idx) {
  if (!isPlayingAll) return;
  if (idx >= slides.length) {
    forceStop(); // 全部播完自動停止並重置
    return;
  }
  
  // 自動切換到該投影片 (設定為自動換頁，不觸發中斷)
  showSlide(idx, true);
  
  const fullText = document.getElementById('script-' + idx).textContent;
  const btn = document.getElementById('mainbtn-' + idx);
  
  // 呼叫 speakText 並傳入 callback 以接續下一頁
  speakText(fullText, btn, idx, () => {
    if (isPlayingAll) {
      globalPlayAllTimer = setTimeout(() => {
        playSlideSequence(idx + 1);
      }, 1500); // 停頓 1.5 秒
    }
  });
}

// 監聽文字反白事件，動態改變按鈕文字
document.addEventListener('selectionchange', () => {
  const selection = window.getSelection().toString().trim();
  // 找到當前頁面「未在播放中」的主播放按鈕
  const currentPlayBtnText = document.querySelector(`#slide-${currentSlide} .btn-play-main:not(.playing) .play-text`);
  if (currentPlayBtnText) {
    currentPlayBtnText.textContent = selection ? '▶ 播放選取段落' : '▶ 播放全部';
  }
});


// ============================================================
//  BUILD UI
// ============================================================
let currentSlide = 0;

function buildNav() {
  const bar = document.getElementById('navBar');
  slides.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
    btn.textContent = `${i + 1}`;
    btn.title = s.label;
    btn.addEventListener('click', () => showSlide(i));
    bar.appendChild(btn);
  });
}

function updateProgress(idx) {
  document.getElementById('progressBar').style.width = ((idx + 1) / slides.length * 100) + '%';
}

function buildSlides() {
  const container = document.getElementById('slideContainer');

  slides.forEach((s, idx) => {
    const section = document.createElement('div');
    section.className = 'slide-section' + (idx === 0 ? ' active' : '');
    section.id = 'slide-' + idx;

    // Dots HTML 
    const dotsHTML = slides.map((_, i) =>
      `<span class="nav-dot${i === idx ? ' active' : ''}" onclick="showSlide(${i})" title="投影片 ${i+1}"></span>`
    ).join('');

    // Classroom items
    const clsHTML = s.classroom.map(item => {
      const safe = item.en.replace(/&/g,'&amp;').replace(/"/g,'&quot;');
      return `
      <div class="classroom-item">
        <div class="classroom-en">"${item.en}"</div>
        <div class="classroom-zh">${item.zh}</div>
        <div class="classroom-footer">
          <span class="classroom-context">📍 ${item.ctx}</span>
          <button class="btn-play-cls"
            data-text="${safe}"
            data-slide="${idx}"
            onclick="speakText(this.dataset.text, this, parseInt(this.dataset.slide))">
            <span class="play-text">▶ 播放</span>
            <div class="audio-visualizer"><span></span><span></span><span></span></div>
          </button>
        </div>
      </div>`;
    }).join('');

    section.innerHTML = `
      <div class="slide-label">${s.label}</div>
      <div class="slide-layout">

        <!-- LEFT: image + nav -->
        <div class="slide-left">
          <div class="slide-img-wrap">
            <img src="${s.img}" alt="${s.label}" loading="lazy">
            <div class="slide-counter-badge">${idx + 1} / ${slides.length}</div>
          </div>
          <!-- Prev / Next -->
          <div class="slide-nav-under">
            <button class="btn-nav" onclick="showSlide(${idx - 1})" ${idx === 0 ? 'disabled' : ''}>← 上一頁</button>
            <div class="nav-dots">${dotsHTML}</div>
            <button class="btn-nav btn-next" onclick="showSlide(${idx + 1})" ${idx === slides.length - 1 ? 'disabled' : ''}>下一頁 →</button>
          </div>
        </div>

        <!-- RIGHT: content panels -->
        <div class="slide-content">

          <div class="panel panel-script">
            <div class="panel-header" onclick="togglePanel(this)">
              <span class="icon">📝</span>
              <span>英文逐字稿</span>
              <span class="chevron">▼</span>
            </div>
            <div class="panel-body">
              <div class="script-text" id="script-${idx}">${s.script}</div>
              <div class="tts-bar">
                <!-- 加上 onmousedown="event.preventDefault()" 避免點擊按鈕時清空文字選取狀態 -->
                <button class="btn-play-main"
                  id="mainbtn-${idx}"
                  data-slide="${idx}"
                  onmousedown="event.preventDefault()"
                  onclick="playScript(this, ${idx})">
                  <span class="play-text">▶ 播放全部</span>
                  <div class="audio-visualizer"><span></span><span></span><span></span></div>
                </button>
                <button class="btn-stop" onclick="forceStop()">⏹ 停止</button>
                <div class="speed-wrap">
                  速度
                  <input type="range" min="0.5" max="1.5" step="0.1" value="1.0"
                    id="speed-${idx}"
                    oninput="document.getElementById('sv-${idx}').textContent=Number(this.value).toFixed(1)+'×'">
                  <span class="speed-val" id="sv-${idx}">1.0×</span>
                </div>
                <div style="flex-basis: 100%; font-size: 0.75rem; color: var(--text-light); margin-top: 8px;">
                  💡 提示：可直接反白上方文字，點擊按鈕即可只播放您選取的段落。
                </div>
              </div>
            </div>
          </div>

          <div class="panel panel-zh">
            <div class="panel-header" onclick="togglePanel(this)">
              <span class="icon">🇹🇼</span>
              <span>中文翻譯</span>
              <span class="chevron">▼</span>
            </div>
            <div class="panel-body">
              <div class="zh-text">${s.zh}</div>
            </div>
          </div>

          <div class="panel panel-classroom">
            <div class="panel-header" onclick="togglePanel(this)">
              <span class="icon">🏫</span>
              <span>課室英語補充</span>
              <span class="chevron">▼</span>
            </div>
            <div class="panel-body">${clsHTML}</div>
          </div>

        </div>
      </div>
    `;
    container.appendChild(section);
  });
}

function togglePanel(header) {
  header.closest('.panel').classList.toggle('collapsed');
}

function showSlide(idx, isAuto = false) {
  if (idx < 0 || idx >= slides.length) return;
  if (!isAuto) {
    forceStop(); // 手動切換投影片時，強制停止目前的語音與連播
  }
  document.querySelectorAll('.slide-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('slide-' + idx).classList.add('active');
  document.querySelectorAll('.nav-btn')[idx].classList.add('active');
  updateProgress(idx);
  currentSlide = idx;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  
  // 換頁時也一併檢查是否有選取的文字，同步更新按鈕顯示
  const selection = window.getSelection().toString().trim();
  const currentPlayBtnText = document.querySelector(`#slide-${currentSlide} .btn-play-main:not(.playing) .play-text`);
  if (currentPlayBtnText) {
    currentPlayBtnText.textContent = selection ? '▶ 播放選取段落' : '▶ 播放全部';
  }
}

window.speechSynthesis.onvoiceschanged = () => {};
buildNav();
buildSlides();
updateProgress(0);
</script>
</body>
</html>
