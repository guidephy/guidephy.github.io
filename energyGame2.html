<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>⚡ 島嶼能源生存戰</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700;900&family=LXGW+WenKai+TC:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap');

        :root {
            --ui-bg: rgba(250, 245, 235, 0.93);
            --ui-bg-solid: #faf5eb;
            --ui-border: #d4c4a8;
            --accent-ink: #b8860b;
            --accent-gold: #c8922a;
            --accent-blue: #5a8fa8;
            --accent-red: #c2625a;
            --accent-green: #6b9e6b;
            --text-main: #3e3428;
            --text-muted: #8a7e6e;
            --text-light: #b5a998;

            --color-coal: #9e9488;
            --color-oil: #6e6458;
            --color-gas: #d4a04a;
            --color-green: #7aae7a;
            --color-solar: #e8b84a;
            --color-nuclear: #9a88b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: manipulation; user-select: none; }

        body {
            font-family: 'LXGW WenKai TC', 'Noto Serif TC', serif;
            width: 100vw;
            height: 100dvh;
            overflow: hidden;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            background: #7ec8e8;
        }

        /* ============================================
           ANIMATED OCEAN BACKGROUND — INTERNATIONAL TRADE
           ============================================ */
        #ocean-bg {
            position: fixed;
            inset: 0;
            z-index: 0;
            overflow: hidden;
            background: linear-gradient(180deg, 
                #c8e6f8 0%,
                #a0d4f0 12%,
                #78c2e8 25%,
                #5cb8e4 40%,
                #45aede 55%,
                #38a0d5 70%,
                #2e94cc 85%,
                #2688c0 100%
            );
        }

        /* Sun reflection on water */
        .sun {
            position: absolute;
            top: 3%;
            right: 15%;
            width: 50px; height: 50px;
            background: radial-gradient(circle, #fff8e0 0%, #ffe880 40%, rgba(255,220,100,0.3) 70%, transparent 100%);
            border-radius: 50%;
            box-shadow: 0 0 60px 20px rgba(255,220,120,0.35), 0 0 120px 40px rgba(255,200,80,0.15);
            animation: sun-breathe 6s ease-in-out infinite alternate;
        }
        @keyframes sun-breathe {
            from { transform: scale(1); box-shadow: 0 0 60px 20px rgba(255,220,120,0.35), 0 0 120px 40px rgba(255,200,80,0.15); }
            to   { transform: scale(1.08); box-shadow: 0 0 80px 30px rgba(255,220,120,0.45), 0 0 150px 50px rgba(255,200,80,0.2); }
        }
        /* Sun reflection column on water */
        .sun-reflect {
            position: absolute;
            top: 12%;
            right: 16%;
            width: 20px;
            height: 55%;
            background: linear-gradient(180deg, rgba(255,230,150,0.2), rgba(255,230,150,0.06), transparent);
            filter: blur(12px);
            pointer-events: none;
        }

        /* Cargo ships — JS controlled, BEHIND Taiwan (below game-stage) */
        #ship-layer {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }
        .ship {
            position: absolute;
            pointer-events: none;
            filter: drop-shadow(2px 3px 3px rgba(0,0,0,0.2));
            transition: none;
            will-change: left, transform;
        }

        /* Ocean waves — full screen subtle */
        .wave-layer {
            position: absolute; bottom: 0; left: 0; width: 100%; height: 100%;
            overflow: hidden; pointer-events: none;
        }

        /* Bottom shore waves */
        .wave-shore {
            position: absolute;
            width: 250%;
            left: -75%;
            height: 60px;
        }
        .wave-shore svg { width: 100%; height: 100%; }
        .ws-1 {
            bottom: 0%;
            animation: sway 7s ease-in-out infinite alternate;
            opacity: 0.2;
        }
        .ws-2 {
            bottom: 2%;
            animation: sway 9s ease-in-out infinite alternate-reverse;
            opacity: 0.12;
        }
        @keyframes sway {
            from { transform: translateX(-3%); }
            to { transform: translateX(3%); }
        }

        /* Sparkles on water */
        .sparkle {
            position: absolute;
            width: 4px; height: 4px;
            background: rgba(255,255,255,0.9);
            border-radius: 50%;
            animation: twinkle 2.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0; transform: scale(0.3); }
            50% { opacity: 1; transform: scale(1.5); }
        }

        /* ============================================
           HUD — WARM CREAM
           ============================================ */
        #hud {
            flex: 0 0 auto;
            background: var(--ui-bg);
            border-bottom: 2px solid var(--ui-border);
            padding: 4px;
            padding-top: max(4px, env(safe-area-inset-top));
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            z-index: 100;
            position: relative;
            backdrop-filter: blur(12px);
        }
        .stat-box {
            position: relative; text-align: center;
            border: 1.5px solid var(--ui-border);
            background: rgba(255,255,255,0.5);
            padding: 2px; cursor: pointer;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .stat-box:active { background: rgba(255,248,230,0.8); }
        .stat-label { font-size: 11px; color: #6a5e4e; display: block; letter-spacing: 1px; }
        .stat-val { font-family: 'Playfair Display', serif; font-size: 18px; color: #2a2218; font-weight: bold; line-height: 1; }
        .stat-val.gold { color: #a06a08; }
        .stat-val.blue { color: #3a7088; }
        .stat-val.red { color: #b03830; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .help-btn {
            position: absolute; top: 0; right: 0;
            color: #fff; background: var(--accent-ink);
            font-size: 9px; font-weight: bold; cursor: pointer;
            width: 13px; height: 13px; line-height: 13px;
            text-align: center; border-bottom-left-radius: 4px;
            border-top-right-radius: 5px;
            font-family: 'Playfair Display', serif;
        }
        .hud-help-icon { font-size: 18px; color: var(--text-main); line-height: 24px; }

        /* ============================================
           INFO BAR
           ============================================ */
        #info-bar {
            display: flex; width: 100%;
            background: rgba(250,245,235,0.92);
            border-bottom: 1.5px solid var(--ui-border);
            font-size: 12px; line-height: 1.35;
            z-index: 90; flex-shrink: 0;
            backdrop-filter: blur(8px);
        }
        #info-bar-story {
            flex: 1; padding: 4px 8px;
            border-right: 1px solid var(--ui-border);
            color: var(--text-main);
        }
        #info-bar-goals { flex: 1; padding: 4px 8px; }
        #info-bar-story .bar-title {
            font-size: 12px; color: var(--accent-gold); font-weight: 700; margin-bottom: 1px;
            font-family: 'Noto Serif TC', serif;
        }
        #info-bar-goals .bar-title {
            font-size: 12px; color: var(--accent-blue); font-weight: 700; margin-bottom: 1px;
            font-family: 'Noto Serif TC', serif;
        }
        .bar-goal-item { display: flex; align-items: center; gap: 3px; font-size: 11px; color: var(--text-main); }
        .bar-goal-item .goal-check { font-size: 12px; }
        .bar-goal-item .goal-check.done { color: var(--accent-green); font-weight: bold; }

        /* ============================================
           MAP STAGE — TRANSPARENT so ocean shows through
           ============================================ */
        #game-stage {
            flex: 1; position: relative; display: flex; justify-content: center; align-items: center;
            overflow: hidden; width: 100%;
            z-index: 1;
            /* NO background — ocean shows through */
        }
        #map-container { position: relative; width: 100%; height: 100%; }

        #map-year-display {
            position: absolute; top: 12px; left: 12px;
            padding: 5px 16px;
            color: var(--text-main);
            font-family: 'Noto Serif TC', serif;
            font-size: 20px;
            font-weight: 700;
            z-index: 92;
            pointer-events: none;
            background: rgba(250,245,235,0.85);
            border-radius: 20px;
            border: 1.5px solid var(--ui-border);
            backdrop-filter: blur(8px);
            letter-spacing: 3px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        #event-review-btn {
            position: absolute; top: 12px; right: 12px;
            padding: 4px 10px;
            color: var(--text-main);
            font-family: 'Noto Serif TC', serif;
            font-size: 12px;
            font-weight: 700;
            z-index: 92;
            pointer-events: auto;
            cursor: pointer;
            background: rgba(250,245,235,0.85);
            border-radius: 16px;
            border: 1.5px solid var(--ui-border);
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.2s;
            display: none;
        }
        #event-review-btn:active { transform: scale(0.95); background: rgba(255,248,230,0.95); }
        #event-review-btn .ev-dot {
            display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 4px; vertical-align: middle;
        }
        #event-review-btn .ev-dot.bad { background: var(--accent-red); }
        #event-review-btn .ev-dot.good { background: var(--accent-green); }
        #event-review-btn .ev-dot.neutral { background: var(--accent-gold); }

        #taiwan-svg {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            filter: drop-shadow(3px 4px 6px rgba(0,0,0,0.2));
            overflow: visible;
        }
        .map-path {
            fill: none;
            stroke: #7a8a6a;
            stroke-width: 2.5px;
            pointer-events: all;
        }

        #map-data-overlay {
            position: absolute;
            bottom: 6px; left: 6px;
            background: rgba(250,245,235,0.9);
            border: 1.5px solid var(--ui-border);
            padding: 5px 7px;
            width: 140px;
            z-index: 95;
            pointer-events: none;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .data-row { font-size: 11px; color: var(--text-muted); margin-bottom: 1px; display: flex; justify-content: space-between; align-items: center; white-space: nowrap; }
        .data-val { color: var(--text-main); font-weight: bold; font-family: 'Playfair Display', serif; font-size: 13px; white-space: nowrap; }
        .data-sep { border-top: 1px dashed var(--ui-border); margin: 2px 0; }
        #fuel-stock-area {
            position: relative;
            padding: 2px 3px;
            margin: 0 -3px;
            border-radius: 5px;
            background: transparent;
            transition: all 0.3s;
        }

        #map-labels-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 20;
        }
        .map-label {
            position: absolute;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #fff;
            text-shadow: 0 1px 4px rgba(0,0,0,0.6), 0 0 8px rgba(0,0,0,0.3);
            pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }
        .map-label-name {
            font-family: 'Noto Serif TC', serif;
            font-weight: 700; font-size: 14px;
            color: #fff;
            background: rgba(0,0,0,0.35);
            padding: 1px 6px; border-radius: 10px;
            margin-bottom: -2px;
        }
        .map-label-val {
            font-family: 'Playfair Display', serif;
            font-size: 24px; font-weight: bold;
            color: #fff; letter-spacing: 0.5px;
        }

        /* ============================================
           BOTTOM PANEL — WARM CREAM
           ============================================ */
        #bottom-panel {
            flex: 0 0 auto;
            background: var(--ui-bg);
            border-top: 2px solid var(--ui-border);
            height: 200px;
            padding: 4px 6px;
            padding-bottom: calc(4px + env(safe-area-inset-bottom));
            display: flex; flex-direction: column; z-index: 100;
            position: relative;
            backdrop-filter: blur(12px);
        }
        .arcade-tabs { display: flex; gap: 8px; margin-bottom: 0; flex-shrink: 0; align-items: flex-end; }

        .pixel-btn {
            flex: 1;
            background: rgba(255,255,255,0.3);
            border: 1.5px solid var(--ui-border); border-bottom: none;
            color: var(--text-muted);
            padding: 6px;
            font-weight: 700; font-size: 13px;
            cursor: pointer; text-align: center;
            transform: translateY(2px);
            transition: all 0.25s;
            border-top-left-radius: 8px; border-top-right-radius: 8px;
            z-index: 1;
            font-family: 'LXGW WenKai TC', serif;
            letter-spacing: 1px;
        }
        .pixel-btn.active {
            background: rgba(90,143,168,0.15);
            border-color: var(--accent-blue); border-bottom: none;
            color: var(--accent-blue);
            transform: translateY(0);
            z-index: 10;
            padding-bottom: 10px;
        }

        .tab-content {
            display: none; flex: 1; overflow: hidden; flex-direction: column;
            border-top: 1.5px solid var(--accent-blue); margin-top: -2px; z-index: 5;
            background: transparent; position: relative;
        }
        .tab-content.active { display: flex; }

        #build-deck, #market-deck {
            display: flex; gap: 4px; flex: 1; width: 100%; padding-top: 4px;
            min-height: 0;
        }

        .pixel-card {
            flex: 1; min-width: 0; position: relative;
            background: linear-gradient(180deg, rgba(255,255,255,0.6) 0%, rgba(250,245,235,0.8) 100%);
            border: 1.5px solid var(--ui-border);
            box-shadow: 0 2px 6px rgba(0,0,0,0.06);
            padding: 2px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
            gap: 0;
            border-radius: 8px;
            transition: all 0.2s;
            overflow: hidden;
        }
        .pixel-card:active { transform: scale(0.97); }
        .pixel-card.selected {
            background: linear-gradient(180deg, rgba(90,143,168,0.15) 0%, rgba(90,143,168,0.08) 100%);
            border-color: var(--accent-blue);
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(90,143,168,0.2);
        }
        .pixel-card.disabled { opacity: 0.4; filter: grayscale(0.7); }

        .card-emoji { font-size: 18px; margin-top: 1px; }
        .card-name { font-size: 11px; text-align: center; white-space: nowrap; color: var(--text-main); font-weight: 700; font-family: 'Noto Serif TC', serif; }
        .card-divider { width: 60%; height: 1px; background: var(--ui-border); margin: 1px 0; }
        .card-label { font-size: 10px; color: var(--text-muted); }
        .card-val { font-family: 'Playfair Display', serif; color: var(--text-main); font-size: 15px; font-weight: bold; }
        .card-risk { font-size: 9px; color: var(--accent-red); font-weight: bold; margin: 1px 0; line-height: 1; }
        .card-cost { font-family: 'Playfair Display', serif; color: var(--accent-gold); font-size: 15px; font-weight: bold; margin-top: auto; }
        .card-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 0; padding-bottom: 1px; }
        .card-badge {
            position: absolute; top: -4px; right: -4px;
            background: var(--accent-ink); color: #fff;
            border: 1.5px solid #fff; border-radius: 8px;
            font-family: 'Playfair Display', serif; font-size: 13px; font-weight: bold;
            padding: 0 5px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.15);
            z-index: 10;
        }
        .nuke-risk { font-size: 11px; color: var(--accent-red); font-weight: bold; }
        .lock-overlay {
            position: absolute; inset: 0; background: rgba(250,245,235,0.8);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: var(--text-muted); font-size: 11px; font-weight: bold; z-index: 5; text-align: center;
            border-radius: 8px;
        }

        /* Market Tabs */
        .market-sub-tabs { display: flex; width: 100%; border-bottom: 1.5px solid var(--ui-border); margin-bottom: 2px; }
        .market-sub-tab {
            flex: 1; padding: 3px 6px; text-align: center;
            font-size: 12px; cursor: pointer; font-weight: 700;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            opacity: 0.5;
            background: rgba(255,255,255,0.2);
            color: var(--text-muted);
            font-family: 'LXGW WenKai TC', serif;
        }
        .market-sub-tab.tab-coal.active {
            opacity: 1; background: rgba(158,148,136,0.1);
            color: var(--text-main); border-bottom-color: var(--color-coal);
        }
        .market-sub-tab.tab-gas.active {
            opacity: 1; background: rgba(212,160,74,0.08);
            color: var(--accent-gold); border-bottom-color: var(--color-gas);
        }

        /* Next Button */
        #next-btn {
            position: fixed;
            bottom: calc(210px + env(safe-area-inset-bottom));
            right: 15px;
            width: 62px; height: 62px;
            background: var(--accent-red);
            border: 2.5px solid #fff; border-radius: 50%;
            box-shadow: 0 3px 12px rgba(0,0,0,0.15);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 150; cursor: pointer;
            font-size: 12px; font-weight: 700; text-align: center; line-height: 1.1;
            animation: pulse-btn 2s ease-in-out infinite;
            font-family: 'LXGW WenKai TC', serif;
            color: #fff;
            letter-spacing: 1px;
        }
        #next-btn:active { transform: scale(0.95); }
        @keyframes pulse-btn { 0%,100% { transform: scale(1); } 50% { transform: scale(1.06); } }

        /* ============================================
           TUTORIAL & HIGHLIGHTS
           ============================================ */
        #tutorial-overlay {
            position: fixed; inset: 0; background: rgba(30,25,18,0.72); z-index: 2000;
            display: none; cursor: pointer;
            backdrop-filter: blur(3px);
        }
        .highlight-target {
            z-index: 2001 !important; position: relative !important;
            box-shadow: 0 0 0 4px #ff1744, 0 0 0 8px rgba(255,23,68,0.45), 0 0 30px rgba(255,23,68,0.6), 0 0 60px rgba(255,23,68,0.2) !important;
            transition: all 0.3s; pointer-events: auto; cursor: pointer;
            animation: hl-scan 1s ease-in-out infinite alternate !important;
            outline: 3px solid #ff1744 !important;
            outline-offset: 3px !important;
        }
        @keyframes hl-scan {
            0%   { box-shadow: 0 0 0 4px #ff1744, 0 0 0 8px rgba(255,23,68,0.45), 0 0 30px rgba(255,23,68,0.6), 0 0 60px rgba(255,23,68,0.2) !important; }
            100% { box-shadow: 0 0 0 5px #ff5252, 0 0 0 10px rgba(255,82,82,0.5), 0 0 45px rgba(255,82,82,0.7), 0 0 80px rgba(255,82,82,0.3) !important; }
        }
        #next-btn.highlight-target { position: fixed !important; }

        #tutorial-tooltip {
            position: fixed; top: 30%; left: 50%; transform: translateX(-50%);
            background: rgba(255,253,245,0.97); color: var(--text-main); padding: 18px 20px;
            border-radius: 14px;
            font-weight: 600; z-index: 2002; display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            text-align: center; width: 80%;
            animation: floatTip 2s ease-in-out infinite alternate;
            cursor: pointer;
            font-family: 'LXGW WenKai TC', serif;
            border: none;
            line-height: 1.6;
        }
        .tut-title {
            color: var(--accent-blue); font-size: 15px; margin-bottom: 8px;
            border-bottom: 1.5px solid var(--ui-border); padding-bottom: 4px;
            font-family: 'Noto Serif TC', serif; font-weight: 700; letter-spacing: 2px;
        }
        @keyframes floatTip { from { transform: translate(-50%, 0); } to { transform: translate(-50%, -8px); } }
        .tut-next { font-size: 10px; color: var(--text-light); margin-top: 8px; }

        /* ============================================
           TOAST
           ============================================ */
        #toast-container {
            position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
            width: 260px; pointer-events: none; z-index: 1500;
            display: flex; flex-direction: column; gap: 6px;
        }
        .toast-msg {
            background: rgba(255,253,247,0.95);
            color: var(--text-main);
            border-left: 3px solid var(--text-light);
            padding: 6px 12px;
            font-family: 'LXGW WenKai TC', serif; font-size: 13px;
            border-radius: 8px;
            backdrop-filter: blur(8px);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            opacity: 0; transform: translateY(-10px);
            animation: toastIn 0.3s forwards;
            transition: all 0.4s ease;
            max-height: 50px; margin-bottom: 6px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .toast-msg.good { border-color: var(--accent-gold); }
        .toast-msg.bad { border-color: var(--accent-red); color: var(--accent-red); }
        @keyframes toastIn { to { opacity: 1; transform: translateY(0); } }
        .toast-msg.hiding {
            opacity: 0; transform: translateX(10px);
            max-height: 0; padding: 0; margin: 0; border: none;
        }

        /* ============================================
           MODAL — SOFT CREAM
           ============================================ */
        #modal-overlay {
            position: fixed; inset: 0; background: rgba(62,52,40,0.5); z-index: 3000;
            display: none; justify-content: center; align-items: center; padding: 20px;
            backdrop-filter: blur(4px);
        }
        .retro-dialog {
            background: linear-gradient(135deg, var(--accent-blue), #7ab8c8);
            border: 2px solid rgba(255,255,255,0.6);
            padding: 3px;
            width: 95%; max-width: 360px; max-height: 85vh;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
            display: flex; flex-direction: column;
            border-radius: 14px;
        }
        .retro-inner {
            background: var(--ui-bg-solid);
            border: 1px solid var(--ui-border);
            padding: 18px; text-align: center;
            overflow-y: auto;
            border-radius: 12px;
        }
        .retro-btn {

</head>

            init() {

                else if(this.tutorialStep===5){ui.switchTab('build',true);ui.highlightElement('#tab-build',"【建設區】\n這裡列出了各種發電設施。\n待會您可以選擇卡片進行建設。\n(點擊畫面繼續)");}
                else if(this.tutorialStep===6){ui.switchTab('market',true);ui.highlightElement('#tab-market',"【燃料市場】\n點擊切換分頁，\n可根據價格購買不同進口國的燃料。");}
                else if(this.tutorialStep===7){ui.switchTab('build',true);ui.highlightElement('#next-btn',"【下一年度】\n準備好後，點擊此處推進時間並獲得稅收。");}
                else ui.clearHighlight();
            },
            startStageTutorial(type){this.stageTutorialType=type;this.stageTutorialStep=1;this.updateStageTutorial();},
            nextStageTutorialStep(){if(this.stageTutorialStep>0){this.stageTutorialStep++;this.updateStageTutorial();}},
            updateStageTutorial() {
                ui.clearHighlight();
                if(this.stageTutorialType==='gas'){
                    if(this.stageTutorialStep===1){ui.renderDeck();ui.switchTab('build',true);setTimeout(()=>{const c=document.querySelector('#build-deck .pixel-card:nth-child(2)');if(c)c.id='highlight-gas-card';ui.highlightElement('#highlight-gas-card',"【🔥 燃氣發電】\n新解鎖！燃氣發電效率高且較環保。\n但需先建造接收站才能興建。");},100);}
                    else if(this.stageTutorialStep===2){ui.switchTab('market',true);ui.setMarketTab('gas');setTimeout(()=>{
                        document.getElementById('tutorial-overlay').style.display='block';
                        const bp=document.getElementById('bottom-panel');if(bp)bp.style.zIndex='2001';
                        const mtGas=document.getElementById('mt-gas');if(mtGas)mtGas.classList.add('highlight-target');
                        const tabMarket=document.getElementById('tab-market');if(tabMarket)tabMarket.classList.add('highlight-target');
                        document.getElementById('tut-text').innerHTML=`<div class='tut-title'>遊戲說明</div>【🔥 燃氣市場】<br>點擊此分頁可購買天然氣燃料，<br>也可在此建造接收站來儲存天然氣。`;
                        document.getElementById('tutorial-tooltip').style.display='block';
                    },100);}
                    else{this.stageTutorialStep=0;this.stageTutorialType=null;ui.clearHighlight();ui.switchTab('build',true);}
                }else if(this.stageTutorialType==='green'){
                    if(this.stageTutorialStep===1){ui.renderDeck();ui.switchTab('build',true);setTimeout(()=>{const cards=document.querySelectorAll('#build-deck .pixel-card');cards.forEach(c=>{const n=c.querySelector('.card-name');if(n&&n.textContent==='風電')c.id='highlight-wind-card';if(n&&n.textContent==='太陽能')c.id='highlight-solar-card';});ui.highlightElement('#highlight-wind-card',"【🌀 風力發電】\n新解鎖！利用台灣海峽的頂級風場，\n不需燃料，是自有能源的關鍵！");},100);}
                    else if(this.stageTutorialStep===2){ui.switchTab('build',true);setTimeout(()=>{ui.highlightElement('#highlight-solar-card',"【☀️ 太陽能發電】\n新解鎖！成本低廉的再生能源，\n不需燃料，可快速佈建提升綠能占比。");},100);}
                    else{this.stageTutorialStep=0;this.stageTutorialType=null;ui.clearHighlight();ui.switchTab('build',true);}
                }else{this.stageTutorialStep=0;this.stageTutorialType=null;ui.clearHighlight();}
            },
            restart(){this.resetVariables();this.counts.coal=0;this.cap.coal=3000;this.updateMarketPrices();ui.renderDeck();ui.renderMarket();ui.updateAll();ui.closeModal();setTimeout(()=>ui.showModal("遊戲重啟","一切回到原點，請重新規劃能源政策！",()=>{ui.closeModal();game.startTutorial();}),300);},
            selectCard(key){if(this.tutorialStep!==0||this.stageTutorialStep!==0)return;if(this.selected===key){this.selected=null;}else{this.selected=key;this.tryBuild();}ui.renderDeck();},
            tryBuild(){
                if(this.tutorialStep!==0||this.stageTutorialStep!==0)return;
                if(!this.selected)return; const p=PLANTS[this.selected];
                if(this.selected==='nuclear'&&this.isNukePermanentlyBanned){ui.floatText('⛔ 核能已永久廢止','bad');this.selected=null;return;}
                if(this.funds<p.cost){ui.floatText('💸 資金不足','bad');this.selected=null;return;}
                if(this.selected==='gas'&&this.counts.terminal===0){ui.floatText('⚠️ 需建接收站','bad');this.selected=null;return;}
                this.funds-=p.cost; this.counts[this.selected]++;
                if(this.selected==='coal')this.cap.coal+=1500; if(this.selected==='terminal')this.cap.gas+=1500;
                ui.floatText(`建設${p.name} -$${p.cost}`,'good'); this.placeBuilding(this.selected);
                this.selected=null; ui.renderDeck(); ui.updateAll();
                if(this.tutorialStep===1){this.tutorialStep=2;this.updateTutorial();}
            },
            buildTerminal(){
                if(this.tutorialStep!==0||this.stageTutorialStep!==0)return;
                const p=PLANTS.terminal; if(this.funds<p.cost){ui.floatText('💸 資金不足','bad');return;}
                this.funds-=p.cost; this.counts.terminal++; this.cap.gas+=1500;
                ui.floatText(`建設接收站 -$${p.cost}`,'good'); this.placeBuilding('terminal'); ui.updateAll();
            },
            placeBuilding(type){
                const pInfo=PLANTS[type]; const el=document.createElement('div');
                el.innerText=pInfo.emoji; el.style.position='absolute'; el.style.fontSize='18px';
                let x,y;
                switch(pInfo.type){case 'sea':x=10+Math.random()*50;y=100+Math.random()*300;break;case 'coast':x=60+Math.random()*20;y=50+Math.random()*300;break;case 'land':x=100+Math.random()*100;y=50+Math.random()*350;break;}
                el.style.left=x+'px'; el.style.top=y+'px';
            },
            buyFuel(type,countryId){
                if(this.tutorialStep!==0||this.stageTutorialStep!==0)return;
                if(this.blockade){ui.floatText('🚫 封鎖中','bad');return;}
                if(this.blockedCountries[type]&&this.blockedCountries[type][countryId]){ui.floatText('🚫 航線中斷，無法購買','bad');return;}
                const basePrice=this.marketPrices[`${type}_${countryId}`]; const surge=this.purchaseCounts[type][countryId]||0; const finalCost=basePrice+surge;
                if(this.funds<finalCost){ui.floatText('💸 資金不足','bad');return;}
                if(this.fuel[type]+100>this.cap[type]){ui.floatText('📦 倉庫已滿','bad');if(type==='gas'&&this.counts.terminal===0)ui.floatText('⚠️ 需接收站','bad');return;}
                this.funds-=finalCost; this.fuel[type]+=100;
                if(!this.purchaseCounts[type][countryId])this.purchaseCounts[type][countryId]=0; this.purchaseCounts[type][countryId]++;
                if(!this.importStats[type][countryId])this.importStats[type][countryId]=0; this.importStats[type][countryId]+=100;
                ui.floatText(`${type==='coal'?'煤炭':'天然氣'}庫存 +100`,'good'); ui.updateAll();
            },
            updateMarketPrices(){
                this.purchaseCounts={coal:{},gas:{}};
                ['coal','gas'].forEach(type=>{MARKET_SOURCES[type].forEach(src=>{let fluc=0.8+Math.random()*0.5;let price=Math.floor(src.base*fluc);if(game.stageIdx===1&&type==='coal')price*=2;this.marketPrices[`${type}_${src.id}`]=price;});});
            },
            // === EVENT SYSTEM ===
            rollWorldEvent(){
                this.blockedCountries={coal:{},gas:{}};
                this.eventPriceEffects={coal:{},gas:{}};
                const pool=WORLD_EVENTS[this.stageIdx];
                if(!pool||pool.length===0){this.currentEvent=null;return null;}
                // Avoid repeating the same event consecutively
                let idx; do{ idx=Math.floor(Math.random()*pool.length); }while(pool.length>1 && idx===this.lastEventIdx[this.stageIdx]);
                this.lastEventIdx[this.stageIdx]=idx;
                const ev=pool[idx]; this.currentEvent=ev;
                let extraIncome=0, extraCompPenalty=0, extraDemand=0;
                // Apply effects
                (ev.effects||[]).forEach(eff=>{
                    if(eff.type==='coal'||eff.type==='gas'){
                        if(eff.blocked){this.blockedCountries[eff.type][eff.country]=true;}
                        if(eff.priceMultiplier){
                            if(eff.allCountries){MARKET_SOURCES[eff.type].forEach(src=>{this.eventPriceEffects[eff.type][src.id]=eff.priceMultiplier;this.marketPrices[`${eff.type}_${src.id}`]=Math.floor(this.marketPrices[`${eff.type}_${src.id}`]*eff.priceMultiplier);});}
                            else if(eff.country){this.eventPriceEffects[eff.type][eff.country]=eff.priceMultiplier;this.marketPrices[`${eff.type}_${eff.country}`]=Math.floor(this.marketPrices[`${eff.type}_${eff.country}`]*eff.priceMultiplier);}
                        }
                    }
                    if(eff.type==='income')extraIncome+=eff.bonus;
                    if(eff.type==='comp')extraCompPenalty+=eff.penalty;
                    if(eff.type==='demandSpike')extraDemand+=eff.amount;
                });
                return {extraIncome,extraCompPenalty,extraDemand};
            },
            calcIncome(){let b=500;if(game.stageIdx===1)b=1000;if(game.stageIdx>=2)b=2000;return b+Math.floor(this.calcPower(true)*0.4);},
            getNukeRisk(){const c=this.counts.nuclear;return c>=NUKE_RISK_MAP.length?50:NUKE_RISK_MAP[c];},
            checkNuclearDisaster(){
                if(this.counts.nuclear>0){const risk=this.getNukeRisk();if(Math.random()*100<risk){
                    this.nukeDisasterCount++;let loss=Math.max(5000,Math.floor(this.funds/2));this.funds-=loss;this.funds-=2000;
                    if(this.funds<0)this.comp-=15;this.counts.nuclear--;this.nukeShutdownTimer=2;this.comp-=30;
                    let msg="☢️ 核災爆發！競爭力-30";if(this.funds<0)msg+="，國家破產 -15";
                    if(this.nukeDisasterCount>=3){this.isNukePermanentlyBanned=true;this.counts.nuclear=0;return "☢️ 核災3次：核能永久廢止！";}else{return msg;}
                    ui.renderDeck();
                }}return null;
            },
            nextTurn(){
                if(this.stageTutorialStep!==0)return;if(this.blockade){this.handleBlockade();return;}
                this.year++;if(this.nukeShutdownTimer>0)this.nukeShutdownTimer--;
                const pOil=this.oilOutput,pCoal=this.calcCoalOutput(),pGas=this.calcGasOutput(),pNuke=this.calcNukeOutput();
                const pGreen=(this.counts.green*PLANTS.green.output)+(this.counts.solar*PLANTS.solar.output);
                this.history.push({year:this.year,oil:pOil,coal:pCoal,gas:pGas,nuclear:pNuke,green:pGreen});
                let turnEvents=[]; const nukeMsg=this.checkNuclearDisaster(); if(nukeMsg)turnEvents.push(nukeMsg);
                const income=this.calcIncome(); this.funds+=income; this.demand+=1200; this.updateMarketPrices();
                // === WORLD EVENT ===
                const evResult=this.rollWorldEvent();
                let eventIncome=0, eventCompPenalty=0;
                if(evResult){
                    eventIncome=evResult.extraIncome||0; eventCompPenalty=evResult.extraCompPenalty||0;
                    this.funds+=eventIncome; this.demand+=(evResult.extraDemand||0);
                    if(eventCompPenalty>0){this.comp-=eventCompPenalty;}
                }
                this.consumeFuel();
                let compChanges=[]; const power=this.calcPower();
                if(power<this.demand){this.comp-=15;compChanges.push("缺電 -15");}else{this.comp=Math.min(100,this.comp+5);compChanges.push("供電穩定 +5");}
                if(eventCompPenalty>0&&this.currentEvent){compChanges.push(this.currentEvent.headline.substring(0,6)+' -'+eventCompPenalty);}
                if(eventIncome>0&&this.currentEvent){turnEvents.push('💰 '+this.currentEvent.effectDesc);}
                const cDays=this.getCoalDays(),gDays=this.getGasDays();
                if(this.counts.coal>0&&cDays===0&&this.counts.gas>0&&gDays===0){this.comp=-100;ui.showGameOver("能源枯竭：煤氣存量歸零！<br>全國大停電導致政府垮台。");return;}
                if(this.stageIdx>=2){if(cDays!==null&&cDays<7){this.comp-=10;compChanges.push("缺煤 -10");}if(gDays!==null&&gDays<7){this.comp-=10;compChanges.push("缺氣 -10");}}
                if(this.comp<=0){ui.showGameOver();return;}
                ui.renderMarket(); ui.updateAll();
                if(!this.isFreePlay){const stage=STAGES[this.stageIdx];if(stage&&stage.goals.every(g=>g.check(this))){
                    if(this.stageIdx<STAGES.length-1){const clearedIdx=this.stageIdx;this.stageIdx++;ui.updateAll();const s=STAGES[this.stageIdx];const nsi=this.stageIdx;
                    ui.showStageComplete(clearedIdx,s,()=>{ui.closeModal();if(nsi===1)game.startStageTutorial('gas');else if(nsi===3)game.startStageTutorial('green');});return;}
                    else{ui.showVictory();return;}
                }}
                if(!this.blockade){this.checkFuelZeroWarning();ui.showTurnReport(this.year,income+eventIncome,compChanges,this.funds,this.comp,turnEvents);
                    if(this.pendingFuelWarning){const btn=document.getElementById('modal-btn');btn.onclick=()=>{ui.closeModal();game.showFuelZeroWarning();};}}
                if(this.tutorialStep===3){this.tutorialStep=0;ui.clearHighlight();ui.switchTab('build',true);}this.tutorialStep=0;
            },
            consumeFuel(){const cN=this.counts.coal*PLANTS.coal.fuel,gN=this.counts.gas*PLANTS.gas.fuel;this.fuel.coal=this.fuel.coal>=cN?this.fuel.coal-cN:0;this.fuel.gas=this.fuel.gas>=gN?this.fuel.gas-gN:0;},
            calcNukeOutput(){return this.nukeShutdownTimer>0?0:this.counts.nuclear*PLANTS.nuclear.output;},
            calcCoalOutput(){if(this.counts.coal===0)return 0;return this.fuel.coal<this.counts.coal*PLANTS.coal.fuel?0:this.counts.coal*PLANTS.coal.output;},
            calcGasOutput(){if(this.counts.gas===0)return 0;return this.fuel.gas<this.counts.gas*PLANTS.gas.fuel?0:this.counts.gas*PLANTS.gas.output;},

                    <div style="position:absolute;top:4px;left:6px;font-size:11px;color:var(--text-muted);font-weight:700;z-index:1;">第 ${game.year} 年完成</div>
                    <svg viewBox="0 0 400 220" style="background:rgba(62,52,40,0.06);width:100%;height:auto;border-radius:4px;"><path d="${paths.green+cp}" fill="var(--color-green)"/><path d="${paths.nuke+cp}" fill="var(--color-nuclear)"/><path d="${paths.gas+cp}" fill="var(--color-gas)"/><path d="${paths.coal+cp}" fill="var(--color-coal)"/><path d="${paths.oil+cp}" fill="var(--color-oil)"/>${xLabels}</svg></div>
                    <div class="chart-legend"><div class="legend-item"><span class="color-box" style="background:var(--color-oil)"></span>油 ${pcts.oil}%</div><div class="legend-item"><span class="color-box" style="background:var(--color-coal)"></span>煤 ${pcts.coal}%</div><div class="legend-item"><span class="color-box" style="background:var(--color-gas)"></span>氣 ${pcts.gas}%</div><div class="legend-item"><span class="color-box" style="background:var(--color-nuclear)"></span>核 ${pcts.nuke}%</div><div class="legend-item"><span class="color-box" style="background:var(--color-green)"></span>綠 ${pcts.green}%</div></div></div>
                    <div class="rank-section"><div class="rank-col"><div class="rank-header">🪨 燃煤進口總量</div>${getRank(game.importStats.coal,'coal')}</div><div class="rank-col"><div class="rank-header">🔥 燃氣進口總量</div>${getRank(game.importStats.gas,'gas')}</div></div></div>
                    <div class="btn-group-horizontal"><button class="retro-btn screenshot" onclick="game.captureScreenshot()">📷 截取圖片</button><button class="retro-btn restart-end" onclick="game.restart()">🔄 重新遊戲</button></div>`;
                document.getElementById('modal-btn').style.display='none';document.getElementById('modal-overlay').style.display='flex';
            },
            showStageComplete(clearedStageIdx,nextStage,callback){
                const cs=STAGES[clearedStageIdx],sn=clearedStageIdx+1;
                const goalsHtml=cs.goals.map(g=>`<div class="stage-clear-goal-item">✅ ${g.txt}</div>`).join('');
                const nextGoalsHtml=nextStage.goals.map(g=>'🔹 '+g.txt).join('<br>');
                document.getElementById('modal-title').innerText='';
                document.getElementById('modal-content-area').innerHTML=`<div class="stage-clear-banner">🎉 階段 ${sn} 過關！</div><div class="stage-clear-sub">${cs.title} — 任務完成</div><div class="stage-clear-goals">${goalsHtml}</div><hr class="stage-clear-divider"><div style="text-align:left;padding:0 5px;line-height:1.6;"><div style="font-size:15px;font-weight:900;color:var(--accent-gold);margin-bottom:6px;font-family:'Noto Serif TC',serif;">▶ 下一階段：${nextStage.title}</div>${nextStage.desc}<br><br><span style="color:var(--accent-blue)">🏆 本階段目標：</span><br>${nextGoalsHtml}</div>`;
                document.querySelector('.retro-dialog').classList.add('stage-clear-dialog');
                const btn=document.getElementById('modal-btn');btn.style.display='block';btn.innerText="🚀 開始挑戰";btn.className='retro-btn stage-clear';btn.onclick=callback||ui.closeModal;document.getElementById('modal-overlay').style.display='flex';
            },
            closeModal(){document.getElementById('modal-overlay').style.display='none';document.getElementById('modal-content-area').innerHTML='<p id="modal-desc" style="font-size:14px;line-height:1.6;color:var(--text-main);margin:15px 0;">CONTENT</p>';document.querySelector('.retro-dialog').classList.remove('stage-clear-dialog');const btn=document.getElementById('modal-btn');btn.style.display='block';btn.className='retro-btn';const rb=document.querySelector('.retro-btn.restart');if(rb)rb.remove();}
        };
        // === SHIP ANIMATION ENGINE ===
        // Ships sail across the ocean, passing beneath Taiwan naturally
        (function(){
            const SHIP_EMOJI = ['🚢','🛳️','⛴️','🚢','🛳️','⛴️'];
            const layer = document.getElementById('ship-layer');
            if(!layer) return;
            const ships = [];
            function randomEmoji(){ return SHIP_EMOJI[Math.floor(Math.random()*SHIP_EMOJI.length)]; }

            // dir: 1 = left-to-right, -1 = right-to-left
            // 🚢 emoji faces LEFT by default, so flip for rightward travel
            function createShip(top, size, opacity, speed, dir){
                const el = document.createElement('div');
                el.className = 'ship';
                el.textContent = randomEmoji();
                el.style.top = top + '%';
                el.style.fontSize = size + 'px';
                el.style.opacity = opacity;
                el.style.transform = dir > 0 ? 'scaleX(-1)' : 'scaleX(1)';
                layer.appendChild(el);
                const startX = dir > 0 ? -(5 + Math.random()*30) : (105 + Math.random()*30);
                return { el, dir, speed, x: startX };
            }

            ships.push(createShip(28, 30, 0.85, 0.0055, 1));
            ships.push(createShip(48, 24, 0.65, 0.004, -1));
            ships.push(createShip(62, 20, 0.5, 0.0032, 1));
            ships.push(createShip(38, 18, 0.4, 0.0045, -1));
            ships.push(createShip(55, 26, 0.6, 0.005, 1));

            let lastT = 0;
            function tick(t){
                const dt = lastT ? (t - lastT) : 16;
                lastT = t;
                ships.forEach(s => {
                    s.x += s.dir * s.speed * dt;
                    // Off screen? Reset from origin side with new emoji
                    if(s.dir > 0 && s.x > 110){
                        s.x = -(5 + Math.random()*20);
                        s.el.textContent = randomEmoji();
                    } else if(s.dir < 0 && s.x < -10){
                        s.x = 105 + Math.random()*20;
                        s.el.textContent = randomEmoji();
                    }
                    s.el.style.left = s.x + '%';
                });
                requestAnimationFrame(tick);
            }
            requestAnimationFrame(tick);
        })();

        game.init();
    </script>
</body>
</html>
