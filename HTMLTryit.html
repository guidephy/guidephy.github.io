<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>Guidephy's HTML Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.css">
  <style>
    * { box-sizing: border-box; }
    
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden; 
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f3f4f6;
      color: #e5e7eb;
      display: flex;
      flex-direction: column;
    }
    
    header {
      flex-shrink: 0;
      padding: 0.75rem 1.5rem;
      background: #111827;
      color: #f9fafb;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    header h1 {
      margin: 0;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: inherit;
      text-decoration: none;
    }
    .brand-link:hover { opacity: 0.9; }
    .home-icon {
      width: 20px;
      height: 20px;
      border-radius: 6px;
      background: #e5e7eb;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #4b5563;
      font-size: 14px;
      font-weight: 700;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    button {
      border: none;
      padding: 0.45rem 0.9rem;
      border-radius: 999px;
      cursor: pointer;
      font-size: 0.9rem;
      background: #2563eb;
      color: #f9fafb;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .btn-icon svg {
      width: 16px;
      height: 16px;
      display: block;
    }
    button.secondary { background: #374151; }
    button.danger { background: #ef4444; color: white; }
    button.danger:hover { background: #dc2626; }
    button:active { transform: translateY(1px); }
    
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0; 
    }
    .split {
      flex: 1;
      display: flex;
      border-top: 1px solid #e5e7eb;
      min-height: 0;
    }
    .pane {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .pane-header {
      flex-shrink: 0;
      padding: 0.5rem 0.9rem;
      background: #e5e7eb;
      border-bottom: 1px solid #d1d5db;
      font-size: 0.85rem;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.5rem;
    }
    .pane-header-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 600;
    }
    .pane-header-right {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
    }
    .pane-body {
      flex: 1;
      position: relative;
      overflow: hidden;
    }
    .pane-body.editor-drop-target.drag-over {
      outline: 2px dashed #60a5fa;
      outline-offset: -4px;
      background: radial-gradient(circle at top, rgba(191,219,254,0.18), transparent 55%);
    }
    
    .CodeMirror {
      height: 100%;
      font-size: 0.95rem;
    }
    
    .cm-s-gpt-dark.CodeMirror { background: #0a0f1a; color: #e5e7eb; padding: 0.75rem; }
    .cm-s-gpt-dark .CodeMirror-gutters { background: #0a0f1a; border-right: 1px solid #1e293b; color: #64748b; }
    .cm-s-gpt-dark .CodeMirror-linenumber { color: #64748b; }
    .cm-s-gpt-dark .CodeMirror-cursor { border-left: 1px solid #e5e7eb; }
    .cm-s-gpt-dark .CodeMirror-selected { background: #1e293b; }
    .cm-s-gpt-dark .CodeMirror-activeline-background { background: #020617; }
    .cm-s-gpt-dark span.cm-tag { color: #ff4d4f; }
    .cm-s-gpt-dark span.cm-bracket { color: #ff4d4f; }
    .cm-s-gpt-dark span.cm-attribute { color: #c4b5fd; }
    .cm-s-gpt-dark span.cm-string { color: #bef264; }
    .cm-s-gpt-dark span.cm-comment { color: #6b7280; font-style: italic; }
    .cm-s-gpt-dark span.cm-keyword { color: #f472b6; }
    .cm-s-gpt-dark span.cm-def { color: #7dd3fc; }
    .cm-s-gpt-dark span.cm-number { color: #facc15; }
    .cm-s-gpt-dark span.cm-atom { color: #f97316; }
    .cm-s-gpt-dark span.cm-builtin { color: #38bdf8; }
    .cm-s-gpt-dark span.cm-meta { color: #a5b4fc; }
    
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      background: white;
    }
    .status-bar {
      position: absolute;
      bottom: 0.4rem;
      right: 0.7rem;
      font-size: 0.75rem;
      background: rgba(17, 24, 39, 0.8);
      color: white;
      padding: 0.2rem 0.6rem;
      border-radius: 999px;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.3s;
    }
    
    @media (max-width: 900px) {
      .split { flex-direction: column; }
      .pane { height: 50%; }
    }
  </style>
</head>

<body>
  <header>
    <h1>
      <a class="brand-link" href="https://guidephy.github.io/" target="_blank" rel="noopener noreferrer">
        <span class="home-icon">⌂</span>
        <span>Guidephy's HTML Studio</span>
      </a>
    </h1>
    <div class="toolbar">
      <button id="runBtn" title="手動重新整理預覽畫面">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="12" rx="2" ry="2"></rect>
            <line x1="8" y1="20" x2="16" y2="20"></line>
            <line x1="12" y1="16" x2="12" y2="20"></line>
          </svg>
        </span>
        <span>重新整理預覽</span>
      </button>

      <button id="imageBtn" class="secondary" title="前往 upload.cc 上傳圖片取得網址">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
            <polyline points="17 8 12 3 7 8"></polyline>
            <line x1="12" y1="3" x2="12" y2="15"></line>
          </svg>
        </span>
        <span>上傳圖片</span>
      </button>

      <button id="openNewBtn" class="secondary">
        <span class="btn-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="4" y="4" width="13" height="13" rx="2" ry="2"></rect>
            <polyline points="14 4 20 4 20 10"></polyline>
            <line x1="20" y1="4" x2="11" y2="13"></line>
          </svg>
        </span>
        <span>新視窗預覽</span>
      </button>

      <button id="downloadBtn" class="secondary">下載 HTML</button>
    </div>
  </header>

  <main>
    <div class="split" id="split-root">
      <section class="pane">
        <div class="pane-header">
          <span class="pane-header-title">
            HTML 程式碼編輯區
          </span>
          <span class="pane-header-right">
            <button id="clearBtn" class="danger" style="padding: 0.2rem 0.6rem; font-size: 0.75rem;" title="清空所有程式碼">
              <span class="btn-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:12px; height:12px;">
                  <polyline points="3 6 5 6 21 6"></polyline>
                  <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                </svg>
              </span>
              清空
            </button>
          </span>
        </div>
        <div class="pane-body editor-drop-target" id="editor-pane-body">
          <textarea id="code"></textarea>
          <div class="status-bar" id="status">就緒</div>
        </div>
      </section>

      <section class="pane">
        <div class="pane-header">
          <span class="pane-header-title">預覽結果</span>
          <span class="pane-header-right"></span>
        </div>
        <div class="pane-body">
          <iframe id="preview"></iframe>
        </div>
      </section>
    </div>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/xml/xml.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/javascript/javascript.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/css/css.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.18/mode/htmlmixed/htmlmixed.min.js"></script>

  <script>
    const STORAGE_KEY = "guidephy_html_code_save";
    const defaultCode = `<!DOCTYPE html>
<html>
<head>
<title>Page Title</title>
</head>
<body>

<h1>This is a Heading</h1>
<p>This is a paragraph.</p>

</body>
</html>`;

    const textarea        = document.getElementById("code");
    const iframe          = document.getElementById("preview");
    const runBtn          = document.getElementById("runBtn");
    const downloadBtn     = document.getElementById("downloadBtn");
    const openNewBtn      = document.getElementById("openNewBtn");
    const clearBtn        = document.getElementById("clearBtn");
    const statusEl        = document.getElementById("status");
    const editorPaneBody  = document.getElementById("editor-pane-body");

    // 1. 初始化：檢查 localStorage 裡面有沒有之前存的程式碼
    const savedCode = localStorage.getItem(STORAGE_KEY);
    if (savedCode !== null) {
      textarea.value = savedCode;
    } else {
      textarea.value = defaultCode;
    }

    const editor = CodeMirror.fromTextArea(textarea, {
      mode: "text/html",
      lineNumbers: true,
      theme: "gpt-dark",
      tabSize: 2,
      indentUnit: 2,
      lineWrapping: true
    });

    let statusTimeout;
    function setStatus(msg) {
      statusEl.textContent = msg;
      statusEl.style.opacity = 1;
      clearTimeout(statusTimeout);
      statusTimeout = setTimeout(() => {
        statusEl.style.opacity = 0; 
      }, 2000);
    }

    // 核心預覽功能
    function runCode() {
      const html = editor.getValue();
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      doc.open();
      doc.write(html);
      doc.close();
    }

    // 2. 自動儲存與即時預覽 (Debounce)
    let typingTimer;
    const typingInterval = 500; // 0.5 秒

    editor.on("change", () => {
      const currentCode = editor.getValue();
      
      // 自動存入 LocalStorage
      localStorage.setItem(STORAGE_KEY, currentCode);

      // 重新計時 0.5 秒，時間到就執行預覽
      clearTimeout(typingTimer);
      typingTimer = setTimeout(() => {
        runCode();
        setStatus("已自動儲存並更新預覽");
      }, typingInterval);
    });

    // 聰明的貼上判定：只在貼上「完整網頁」時才回到最上方
    editor.on("paste", (cm, e) => {
      // 取得使用者正在貼上的文字
      const clipboardData = e.clipboardData || window.clipboardData;
      const pastedText = clipboardData ? clipboardData.getData("text") : "";
      const lowerText = pastedText.toLowerCase();
      
      // 判斷條件：是否包含網頁宣告，或是完整的 html 標頭與結尾
      const isFullDocument = lowerText.includes("<!doctype html>") || 
                            (lowerText.includes("<html") && lowerText.includes("</html"));

      if (isFullDocument) {
        // 只有貼上整份完整文件時，才強制滾動到最上方
        setTimeout(() => {
          cm.setCursor(0, 0);
          cm.scrollTo(0, 0);
        }, 10);
      }
      // 如果只是貼上部分程式碼，就不做任何事，讓游標自然停在原地
    });

    // 清空按鈕：連同 localStorage 一起清掉
    clearBtn.addEventListener("click", () => {
      if (confirm("確定要清空所有程式碼嗎？")) {
        editor.setValue("");
        editor.clearHistory(); 
        localStorage.removeItem(STORAGE_KEY); // 清除暫存
        editor.focus();
        setStatus("程式碼已清空");
      }
    });

    // 下載功能
    function downloadHtml() {
      let filename = prompt("請輸入檔名（不需 .html）", "my_page");
      if (filename === null) return;
      filename = filename.trim().replace(/[\\/:*?\"<>|]/g, "");
      if (filename === "") filename = "my_page";

      const blob = new Blob([editor.getValue()], { type: "text/html;charset=utf-8" });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = filename + ".html";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);

      setStatus("已下載：" + filename + ".html");
    }

    // 新視窗預覽功能
    function openInNewWindow() {
      const html = editor.getValue();
      const win = window.open("", "_blank");

      if (!win) {
        alert("瀏覽器阻擋了彈出視窗，請允許彈出視窗後再試一次！");
        return;
      }

      win.document.open();
      win.document.write(html);
      win.document.close();
      setStatus("已在新視窗開啟預覽");
    }

    // 手動按鈕事件綁定
    runBtn.addEventListener("click", () => {
      runCode();
      setStatus("已手動更新預覽");
    });
    downloadBtn.addEventListener("click", downloadHtml);
    openNewBtn.addEventListener("click", openInNewWindow);

    // 拖曳檔案功能
    function setupDragAndDropForEditor() {
      if (!editorPaneBody) return;
      const preventDefaults = (e) => { e.preventDefault(); e.stopPropagation(); };

      ["dragenter", "dragover", "dragleave", "drop"].forEach(eventName => {
        editorPaneBody.addEventListener(eventName, preventDefaults, false);
      });
      ["dragenter", "dragover"].forEach(eventName => {
        editorPaneBody.addEventListener(eventName, () => editorPaneBody.classList.add("drag-over"), false);
      });
      ["dragleave", "drop"].forEach(eventName => {
        editorPaneBody.addEventListener(eventName, () => editorPaneBody.classList.remove("drag-over"), false);
      });

      editorPaneBody.addEventListener("drop", (e) => {
        const dt = e.dataTransfer;
        const files = dt.files;
        if (!files || files.length === 0) return;

        const file = files[0];
        const name = file.name || "";

        if (!/\.html?$/i.test(name)) {
          alert("請拖曳 .html 或 .htm 檔案到左側編輯區。");
          return;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          const text = event.target.result || "";
          editor.setValue(text);
          editor.setCursor(0, 0);
          editor.scrollTo(0, 0);
          setStatus("已載入：" + name);
        };
        reader.readAsText(file, "utf-8");
      }, false);
    }

    setupDragAndDropForEditor();

    // 圖片上傳按鈕
    const imageBtn = document.getElementById("imageBtn");
    imageBtn.addEventListener("click", () => {
      window.open("https://upload.cc/", "_blank");
      setStatus("已開啟 upload.cc");
    });

    // 3. 頁面載入完成後，自動執行一次預覽
    setTimeout(runCode, 100);

  </script>
</body>
</html>
