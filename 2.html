<!doctype html>
<html lang="zh-Hant">
<head>

  <style>
    :root {

    * { box-sizing: border-box; }
    body {

    .search { min-width: 260px; padding: 0 10px; }

    .metric .value { margin-top: 4px; font-size: 23px; font-weight: 800; }
    .metric .sub { margin-top: 4px; color: var(--muted); font-size: 12px; white-space: pre-line; }
    .layout { display: grid; grid-template-columns: 270px minmax(0, 1fr); gap: 14px; align-items: start; }
    aside {
      position: sticky;

      padding: 10px 14px;

      background: #fbfcfe;

    .summary-line-primary {
      color: #0f5f58;

    }
    .summary-line-formula {

      font-weight: 800;

    }
    .summary-line-muted {
      color: #475569;

    }
    .mini { text-align: right; }

    .table-wrap { overflow: auto; max-height: calc(100vh - 250px); }
    table { width: 100%; border-collapse: separate; border-spacing: 0; min-width: 1200px; }

      position: sticky;

      z-index: 2;

    .diff-list {

      white-space: pre-line;

    .teacher-diff-stats {

    }
    .diff-course-box.removed {
      background: #fff1f2;
      border-left: 3px solid #ef4444;
    }
    .diff-course-title {
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
      color: #334155;
    }
    .diff-course-lines {
      display: grid;
      gap: 5px;

    .diff-course-line {

      line-height: 1.4;
      color: #1f2937;
    }
    .teacher-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: white;

    .card-top { display: flex; justify-content: space-between; gap: 10px; align-items: start; }
    .card-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 10px 0; }
    .card-grid div { background: #f8fafc; border-radius: 6px; padding: 7px; }
    .card-grid span { display: block; color: var(--muted); font-size: 11px; }
    .card-grid strong { font-size: 15px; }
    .mobile-subject { display: none; }

    .course-section { display: none; }

  <div class="shell">
    <header>
      <div>

        <div class="diff-list" id="diffList"></div>
      </main>
    </section>
  </div>

      const subjects = filteredDiffSubjects();
      if (!subjects.length) {
        diffList.innerHTML = `<div class="empty">沒有符合條件的差異資料</div>`;
        return;
      }
      diffList.innerHTML = subjects.map(subject => `<section class="diff-subject-card">
        <div class="diff-subject-head">
          <div class="diff-subject-title">${esc(subject.subject)}</div>
          <div class="diff-stats">
            <span class="diff-chip">總節 ${subject.total1} → ${subject.total2} (${subject.total2 - subject.total1 > 0 ? `+${subject.total2 - subject.total1}` : subject.total2 - subject.total1})</span>
            <span class="diff-chip">本科 ${subject.regular1} → ${subject.regular2} (${subject.regular2 - subject.regular1 > 0 ? `+${subject.regular2 - subject.regular1}` : subject.regular2 - subject.regular1})</span>
            <span class="diff-chip">教師 ${subject.teachers.length} 位</span>
          </div>
        </div>
        ${subject.teachers.map(teacher => teacherDiffHtml(subject.subject, teacher)).join("")}
      </section>`).join("");
    }

    function render() {
      renderButtons(semesterControl, [{value:"114-1",label:"114-1"}, {value:"114-2",label:"114-2"}, {value:"diff",label:"差異"}], state.semester, value => {
        state.semester = value;
        render();
      });
      renderSubjects();
      const rows = filteredTeachers();
      mainTitle.textContent = isDiffMode() ? (state.subject === "全部" ? "學期差異" : `${state.subject} 差異`) : (state.subject === "全部" ? "總表" : state.subject);
      countNote.textContent = isDiffMode()
        ? `114-1 vs 114-2 · ${filteredDiffSubjects().reduce((acc, subject) => acc + subject.teachers.length, 0)} 位教師`
        : `${state.semester} · ${rows.length} 位教師`;
      renderMetrics(rows);
      renderSubjectSummary(rows);
      if (isDiffMode()) {
        renderDiffs();
      } else {
        renderTeachers(rows);
      }
    }

    searchInput.addEventListener("input", event => {
      state.query = event.target.value;
      render();
    });
    mobileSearchToggle.addEventListener("click", () => {
      document.body.classList.toggle("search-open");
      if (document.body.classList.contains("search-open")) {
        searchInput.focus();
      }
    });
    let lastScrollY = window.scrollY;
    window.addEventListener("scroll", () => {
      if (window.innerWidth > 760) return;
      const currentY = window.scrollY;
      if (currentY <= 8) {
        document.body.classList.remove("scrolled-down");
        document.body.classList.add("scrolled-up");
      } else if (currentY > lastScrollY + 8) {
        document.body.classList.add("scrolled-down");
        document.body.classList.remove("scrolled-up");
      } else if (currentY < lastScrollY - 8) {
        document.body.classList.remove("scrolled-down");
        document.body.classList.add("scrolled-up");
      }
      lastScrollY = currentY;
    }, { passive: true });
    document.body.classList.add("scrolled-up");
    render();
  </script>
</body>
</html>
